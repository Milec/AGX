<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Algalterian Galactic Exchange</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  /* shared shape scale — angular HUD geometry */
  --r:8px; --r-md:5px; --r-sm:3px;
  /* accents */
  --cyan:#36EFE0; --amber:#FFC24B; --vio:#B59CFF;
  --up:#34E2A2; --down:#FF5C7C;
  /* ── DARK THEME (default) ── */
  --bg:#05070f; --ink:#E8EFFF; --dim:#8294B8;
  --panel:rgba(20,28,48,.55); --panel2:rgba(14,20,38,.5);
  --line:rgba(150,178,228,.10); --line2:rgba(155,184,235,.18);
  --hi:rgba(255,255,255,.14);
  --glass-grad:linear-gradient(160deg,rgba(255,255,255,.07),rgba(255,255,255,.02));
  --glass-strong:linear-gradient(160deg,rgba(255,255,255,.09),rgba(255,255,255,.02));
  --row-grad:linear-gradient(160deg,rgba(255,255,255,.045),rgba(255,255,255,.01));
  --input-bg:rgba(8,12,22,.6);
  --chip-bg:rgba(255,255,255,.04);
  --inset-bg:rgba(4,8,16,.6);
  --header-bg:rgba(7,10,20,.62);
  --nav-bg:rgba(8,11,22,.72);
  --modal-grad:linear-gradient(180deg,rgba(22,30,52,.92),rgba(10,16,32,.96));
  --toast-grad:linear-gradient(180deg,rgba(24,32,54,.92),rgba(14,20,38,.95));
  --scrim:rgba(2,4,10,.72);
  --shadow:0 18px 50px -18px rgba(0,0,0,.7);
  --glow:0 0 30px -6px color-mix(in srgb,var(--cyan) 50%,transparent);
  --chart-label-bg:rgba(10,16,32,.9);
  --grab:rgba(255,255,255,.25);
  --aurora-1:rgba(54,239,224,.12); --aurora-2:rgba(181,156,255,.11); --aurora-3:rgba(255,194,75,.06);
  --body-base:linear-gradient(180deg,#070b16,#04060d 60%);
  --grid-dot:rgba(90,140,180,.16); --bracket:var(--cyan);
}
:root[data-theme="light"]{
  --bg:#eef2fb; --ink:#0E1A2E; --dim:#5A6B86;
  --cyan:#08B6A6; --vio:#7C5CF0; --amber:#C97E00;
  --up:#0DA86C; --down:#E23857;
  --panel:rgba(255,255,255,.7); --panel2:rgba(255,255,255,.6);
  --line:rgba(20,40,80,.10); --line2:rgba(20,40,80,.16);
  --hi:rgba(255,255,255,.85);
  --glass-grad:linear-gradient(160deg,rgba(255,255,255,.78),rgba(255,255,255,.5));
  --glass-strong:linear-gradient(160deg,rgba(255,255,255,.92),rgba(255,255,255,.64));
  --row-grad:linear-gradient(160deg,rgba(255,255,255,.72),rgba(255,255,255,.46));
  --input-bg:rgba(255,255,255,.78);
  --chip-bg:rgba(255,255,255,.6);
  --inset-bg:rgba(255,255,255,.55);
  --header-bg:rgba(244,247,253,.72);
  --nav-bg:rgba(248,250,254,.8);
  --modal-grad:linear-gradient(180deg,rgba(255,255,255,.95),rgba(238,242,251,.97));
  --toast-grad:linear-gradient(180deg,rgba(255,255,255,.95),rgba(238,242,251,.96));
  --scrim:rgba(150,170,205,.5);
  --shadow:0 18px 50px -22px rgba(40,60,110,.35);
  --chart-label-bg:rgba(255,255,255,.92);
  --grab:rgba(20,40,80,.22);
  --aurora-1:rgba(8,182,166,.16); --aurora-2:rgba(124,92,240,.13); --aurora-3:rgba(201,126,0,.09);
  --body-base:linear-gradient(180deg,#f4f7fe,#e7edf9 60%);
  --grid-dot:rgba(20,60,110,.12); --bracket:var(--cyan);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg);color:var(--ink);
  font-family:'Space Grotesk',-apple-system,BlinkMacSystemFont,sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(1100px 600px at 80% -12%,var(--aurora-1),transparent 55%),
    radial-gradient(900px 520px at -8% 6%,var(--aurora-2),transparent 55%),
    radial-gradient(820px 600px at 50% 124%,var(--aurora-3),transparent 55%),
    var(--body-base);
  background-attachment:fixed;
  transition:background-color .35s ease,color .35s ease;
}
body::before{content:'';position:fixed;inset:-25%;z-index:-1;pointer-events:none;
  background:radial-gradient(38% 38% at 28% 32%,var(--aurora-2),transparent 70%),radial-gradient(40% 40% at 72% 64%,var(--aurora-1),transparent 70%);
  filter:blur(46px);opacity:.7;animation:aurora 24s ease-in-out infinite alternate}
@keyframes aurora{0%{transform:translate3d(-3%,-2%,0) scale(1)}100%{transform:translate3d(3%,2%,0) scale(1.12)}}
/* technical dotted-grid overlay (HUD) */
body::after{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background-image:radial-gradient(var(--grid-dot) 1px,transparent 1.4px);background-size:24px 24px;opacity:.6}
.mono{font-family:'IBM Plex Mono',monospace}
h1,h2,h3,.disp{font-family:'Orbitron',sans-serif;letter-spacing:.06em}
.up{color:var(--up)} .down{color:var(--down)} .dim{color:var(--dim)} .amber{color:var(--amber)} .cyan{color:var(--cyan)}

/* ── controls ── */
button{font-family:inherit;cursor:pointer;border:none;border-radius:var(--r-md);font-size:14px;letter-spacing:.03em}
input,select{
  font-family:'IBM Plex Mono',monospace;background:var(--input-bg);
  border:1px solid var(--line2);
  color:var(--ink);border-radius:var(--r-md);padding:12px 14px;font-size:16px;width:100%;
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);box-shadow:inset 0 1px 0 var(--hi);
  transition:border-color .15s,box-shadow .15s,background-color .35s ease,color .35s ease;
}
input:focus,select:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px color-mix(in srgb,var(--cyan) 22%,transparent),inset 0 1px 0 var(--hi)}
.btn{position:relative;overflow:hidden;background:linear-gradient(180deg,#48f4e5,#18c6bc);color:#012b27;font-weight:700;padding:12px 18px;box-shadow:0 8px 22px -10px rgba(54,239,224,.7),inset 0 1px 0 rgba(255,255,255,.45);transition:transform .12s,filter .2s,box-shadow .2s}
.btn::after{content:'';position:absolute;top:0;left:0;height:100%;width:45%;pointer-events:none;background:linear-gradient(110deg,transparent,rgba(255,255,255,.4),transparent);transform:translateX(-200%)}
.btn:hover::after{animation:sheen .6s ease}
@keyframes sheen{to{transform:translateX(340%)}}
.btn:hover{filter:brightness(1.07)}
.btn:active{transform:translateY(1px) scale(.99)}
.btn.ghost{background:color-mix(in srgb,var(--cyan) 10%,transparent);color:var(--cyan);border:1px solid color-mix(in srgb,var(--cyan) 45%,transparent);box-shadow:inset 0 1px 0 var(--hi)}
.btn.amber{background:linear-gradient(180deg,#ffce6b,#f0a92e);color:#2a1800;box-shadow:0 8px 22px -10px rgba(255,194,75,.6),inset 0 1px 0 rgba(255,255,255,.45)}
.btn.red{background:linear-gradient(180deg,#ff6f8c,#e63a5e);color:#2a0010;box-shadow:0 8px 22px -10px rgba(255,92,124,.6),inset 0 1px 0 rgba(255,255,255,.4)}
.btn.vio{background:linear-gradient(180deg,#c4adff,#9a78ff);color:#190640;box-shadow:0 8px 22px -10px rgba(181,156,255,.6),inset 0 1px 0 rgba(255,255,255,.4)}
.btn:disabled{opacity:.3;cursor:not-allowed;box-shadow:none;filter:none}

/* ── cards ── */
.card{position:relative;background:var(--glass-grad);border:1px solid var(--line2);border-radius:0;padding:18px;
  -webkit-backdrop-filter:blur(22px) saturate(160%);backdrop-filter:blur(22px) saturate(160%);box-shadow:inset 0 1px 0 var(--hi);
  --ch:16px;clip-path:polygon(0 0,calc(100% - var(--ch)) 0,100% var(--ch),100% 100%,var(--ch) 100%,0 calc(100% - var(--ch)))}
/* HUD corner brackets on the squared corners (top-left + bottom-right) */
.card::before,.card::after{content:'';position:absolute;width:13px;height:13px;pointer-events:none;opacity:.85;z-index:1}
.card::before{top:0;left:0;border-top:2px solid var(--bracket);border-left:2px solid var(--bracket)}
.card::after{bottom:0;right:0;border-bottom:2px solid var(--bracket);border-right:2px solid var(--bracket)}
.wrap{max-width:920px;margin:0 auto;padding:8px 14px 120px}

/* ── header ── */
header{position:sticky;top:0;z-index:30;background:var(--header-bg);-webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);border-bottom:1px solid var(--line);transition:background-color .35s ease,border-color .35s ease}
.iconbtn{width:38px;height:38px;flex:none;border-radius:50%;background:var(--chip-bg);border:1px solid var(--line2);color:var(--ink);font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);box-shadow:inset 0 1px 0 var(--hi);transition:transform .15s,background-color .2s}
.iconbtn:hover{transform:translateY(-1px)} .iconbtn:active{transform:scale(.92)}
.hbar{max-width:920px;margin:0 auto;display:flex;align-items:center;gap:12px;padding:12px 16px}
.logo{font-family:'Orbitron';font-weight:900;font-size:16px;color:var(--cyan);line-height:1;text-shadow:var(--glow)}
.logo small{display:block;font-size:8px;color:var(--dim);letter-spacing:.32em;font-weight:500;margin-top:3px;text-transform:uppercase}
.hnw{margin-left:auto;text-align:right}
.hnw .v{font-family:'IBM Plex Mono';font-weight:600;font-size:16px}
.hnw .l{font-size:9px;color:var(--dim);letter-spacing:.2em;text-transform:uppercase}
.scan{height:1px;background:linear-gradient(90deg,transparent,var(--cyan) 40%,var(--vio) 60%,transparent);opacity:.6}
.gclk{font-family:'IBM Plex Mono';font-size:10px;color:var(--dim);text-align:center;padding:5px 0;border-bottom:1px solid var(--line);letter-spacing:.14em;background:rgba(54,239,224,.02)}
.bm-tag{color:var(--down)!important}

/* ── scrolling ticker ── */
.ticker{overflow:hidden;border-bottom:1px solid var(--line);background:rgba(4,7,14,.5);white-space:nowrap}
.ticker-inner{display:inline-block;padding:7px 0;font-family:'IBM Plex Mono','SF Mono','Menlo',monospace;font-size:12px;animation:tk 45s linear infinite}
@keyframes tk{from{transform:translateX(100vw)}to{transform:translateX(-100%)}}
@media (prefers-reduced-motion: reduce){.ticker-inner{animation:none}}
.ticker b{color:var(--amber);font-weight:600}
.regime-banner{position:relative;overflow:hidden;padding:8px 12px;text-align:center;font-family:'Orbitron';font-size:11px;letter-spacing:.22em;border-bottom:1px solid var(--line)}
.regime-banner::after{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(110deg,transparent 42%,color-mix(in srgb,var(--cyan) 16%,transparent) 50%,transparent 58%);transform:translateX(-100%);animation:bannerSheen 7s ease-in-out infinite}
@keyframes bannerSheen{0%,55%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.halt-banner{padding:9px 12px;text-align:center;font-family:'Orbitron';font-size:12px;letter-spacing:.22em;background:rgba(255,92,124,.12);color:var(--down);border-bottom:1px solid var(--down);text-shadow:0 0 12px rgba(255,92,124,.7)}

/* ── bottom nav ── */
nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:var(--nav-bg);-webkit-backdrop-filter:blur(26px) saturate(170%);backdrop-filter:blur(26px) saturate(170%);
  border-top:1px solid var(--line2);border-radius:10px 10px 0 0;display:flex;justify-content:space-around;
  padding:8px max(6px,env(safe-area-inset-left)) calc(8px + env(safe-area-inset-bottom)) max(6px,env(safe-area-inset-right));
  box-shadow:0 -18px 40px -22px rgba(0,0,0,.5),inset 0 1px 0 var(--hi);transition:background-color .35s ease}
nav button{flex:1 1 0;min-width:0;background:none;color:var(--dim);font-size:9px;letter-spacing:.05em;padding:9px 2px;font-family:'Orbitron';
  border-radius:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .15s,background .15s,box-shadow .15s}
nav button.on{color:var(--cyan);background:color-mix(in srgb,var(--cyan) 12%,transparent);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--cyan) 38%,transparent),0 0 18px -6px color-mix(in srgb,var(--cyan) 55%,transparent);text-shadow:0 0 12px color-mix(in srgb,var(--cyan) 55%,transparent)}
nav button.home{flex:0 0 auto;padding:9px 14px;color:var(--amber)}
nav button.home.on{color:var(--amber);background:color-mix(in srgb,var(--amber) 12%,transparent);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--amber) 38%,transparent);text-shadow:0 0 12px color-mix(in srgb,var(--amber) 55%,transparent)}

/* ── data-pad home launcher ── */
.pad-intro{font-family:'Orbitron';font-size:11px;letter-spacing:.26em;color:var(--dim);text-transform:uppercase;text-align:center;margin:18px 0 4px}
.app-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:10px}
@media(min-width:560px){.app-grid{grid-template-columns:repeat(3,1fr)}}
.app-tile{position:relative;background:var(--glass-grad);border:1px solid var(--line2);
  -webkit-backdrop-filter:blur(22px) saturate(160%);backdrop-filter:blur(22px) saturate(160%);box-shadow:inset 0 1px 0 var(--hi);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;padding:30px 14px 26px;cursor:pointer;text-align:center;
  --ch:16px;clip-path:polygon(0 0,calc(100% - var(--ch)) 0,100% var(--ch),100% 100%,var(--ch) 100%,0 calc(100% - var(--ch)));
  transition:transform .14s,box-shadow .2s,border-color .15s}
.app-tile::before,.app-tile::after{content:'';position:absolute;width:13px;height:13px;pointer-events:none;opacity:.85;z-index:1}
.app-tile::before{top:0;left:0;border-top:2px solid var(--acc);border-left:2px solid var(--acc)}
.app-tile::after{bottom:0;right:0;border-bottom:2px solid var(--acc);border-right:2px solid var(--acc)}
.app-tile:hover{transform:translateY(-3px);border-color:var(--acc);box-shadow:0 16px 34px -18px var(--acc)}
.app-tile:active{transform:translateY(-1px) scale(.99)}
.app-tile .glyph{font-size:38px;line-height:1;color:var(--acc);text-shadow:0 0 18px var(--acc)}
.app-tile .an{font-family:'Orbitron';font-weight:700;font-size:13px;letter-spacing:.08em}
.app-tile .at{font-size:10px;color:var(--dim);letter-spacing:.04em;line-height:1.4}
.app-tile.locked{opacity:.62;--acc:var(--dim)}
.app-tile.locked .glyph{filter:grayscale(1)}
.app-tile.locked .at{color:var(--down);letter-spacing:.16em;font-family:'Orbitron'}
.app-tile .lockbadge{position:absolute;top:8px;right:10px;font-size:15px;z-index:2;filter:saturate(0) brightness(1.4)}

/* ── unauthorized access wall ── */
.lockwall{display:flex;align-items:center;justify-content:center;min-height:62vh;padding:20px}
.lockwall-card{position:relative;max-width:380px;width:100%;text-align:center;padding:34px 24px;border:1px solid var(--down);
  background:color-mix(in srgb,var(--down) 7%,var(--panel));-webkit-backdrop-filter:blur(22px) saturate(160%);backdrop-filter:blur(22px) saturate(160%);
  box-shadow:0 0 40px -16px var(--down),inset 0 1px 0 var(--hi);
  --ch:18px;clip-path:polygon(0 0,calc(100% - var(--ch)) 0,100% var(--ch),100% 100%,var(--ch) 100%,0 calc(100% - var(--ch)))}
.lockwall-card::before,.lockwall-card::after{content:'';position:absolute;width:16px;height:16px;pointer-events:none}
.lockwall-card::before{top:0;left:0;border-top:2px solid var(--down);border-left:2px solid var(--down)}
.lockwall-card::after{bottom:0;right:0;border-bottom:2px solid var(--down);border-right:2px solid var(--down)}
.lockwall-glyph{font-size:46px;line-height:1;animation:lockPulse 1.6s ease-in-out infinite}
@keyframes lockPulse{0%,100%{opacity:1;filter:drop-shadow(0 0 8px var(--down))}50%{opacity:.45}}
.lockwall h1{font-family:'Orbitron';font-size:22px;letter-spacing:.18em;color:var(--down);margin:14px 0 4px;text-shadow:0 0 16px color-mix(in srgb,var(--down) 60%,transparent)}
.lockwall-app{font-family:'Orbitron';font-size:11px;letter-spacing:.22em;color:var(--ink)}
.lockwall-msg{font-size:13px;color:var(--dim);line-height:1.55;margin-top:14px}
.lockwall-code{font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.12em;color:var(--down);margin-top:16px;opacity:.8}
@media (prefers-reduced-motion:reduce){.lockwall-glyph{animation:none}}

/* ── field notes app ── */
.note-card{position:relative;border:1px solid var(--line);border-left:2px solid var(--vio);border-radius:var(--r-md);background:var(--row-grad);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);padding:13px 14px;margin:9px 0;cursor:pointer;transition:transform .12s,border-color .15s,box-shadow .2s}
.note-card:hover{transform:translateY(-1px);border-color:var(--vio);box-shadow:var(--shadow)}
.note-card:active{transform:scale(.995)}
.note-card-h{display:flex;align-items:center;gap:8px}
.note-pin{flex:none;font-size:12px}
.note-card-t{flex:1;min-width:0;font-family:'Orbitron';font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-card-time{flex:none;font-family:'IBM Plex Mono';font-size:10px;color:var(--dim)}
.note-card-s{font-size:12px;color:var(--dim);margin-top:5px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.note-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.note-tag{font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.04em;color:var(--vio);background:color-mix(in srgb,var(--vio) 12%,transparent);border:1px solid color-mix(in srgb,var(--vio) 32%,transparent);border-radius:6px;padding:2px 7px}
.note-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding-top:12px}
.note-bar-r{display:flex;align-items:center;gap:8px}
.note-back{padding:8px 12px;font-size:11px}
.note-tools{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.note-tool{flex:none;min-width:34px;background:var(--chip-bg);color:var(--ink);border:1px solid var(--line2);border-radius:8px;padding:7px 9px;font-size:13px;font-family:'IBM Plex Mono';transition:background .15s,border-color .15s}
.note-tool:hover{border-color:var(--vio);color:var(--vio)}
.note-body{font-family:'IBM Plex Mono',monospace;background:var(--input-bg);border:1px solid var(--line2);color:var(--ink);border-radius:var(--r-md);
  padding:12px 14px;font-size:14px;width:100%;min-height:300px;line-height:1.6;resize:vertical;margin-top:10px;
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
.note-body:focus{outline:none;border-color:var(--vio);box-shadow:0 0 0 3px color-mix(in srgb,var(--vio) 20%,transparent)}
.note-meta{font-family:'IBM Plex Mono';font-size:10px;color:var(--dim);margin-top:10px;letter-spacing:.06em}
.note-view-title{font-family:'Orbitron';font-size:22px;letter-spacing:.04em;margin-top:14px;line-height:1.2;color:var(--cyan);text-shadow:var(--glow)}
.note-render{margin-top:14px;font-size:15px;line-height:1.65}
.note-render p{margin:10px 0}
.note-render h2{font-family:'Orbitron';font-size:18px;margin:18px 0 8px;color:var(--ink)}
.note-render h3{font-family:'Orbitron';font-size:15px;letter-spacing:.04em;margin:16px 0 6px;color:var(--amber)}
.note-render h4,.note-render h5{font-family:'Orbitron';font-size:13px;letter-spacing:.06em;margin:14px 0 6px;color:var(--dim);text-transform:uppercase}
.note-render ul,.note-render ol{margin:10px 0 10px 22px}.note-render li{margin:4px 0}
.note-render code{font-family:'IBM Plex Mono';font-size:13px;background:var(--chip-bg);border:1px solid var(--line);border-radius:5px;padding:1px 5px}
.note-render blockquote{border-left:3px solid var(--vio);margin:12px 0;padding:4px 14px;color:var(--dim);background:color-mix(in srgb,var(--vio) 6%,transparent)}
.note-render hr{border:none;border-top:1px solid var(--line2);margin:18px 0}
.note-link{color:var(--cyan);text-decoration:none;border-bottom:1px dashed color-mix(in srgb,var(--cyan) 55%,transparent);cursor:pointer}
.note-link:hover{color:var(--ink);border-bottom-style:solid}
.note-link.missing{color:var(--amber);border-bottom-color:color-mix(in srgb,var(--amber) 55%,transparent)}
.note-link.tick{color:var(--up);font-family:'IBM Plex Mono';font-weight:600;border-bottom-color:color-mix(in srgb,var(--up) 55%,transparent)}
.note-backlinks{margin-top:24px;padding-top:14px;border-top:1px solid var(--line)}
.note-bl-h{font-family:'Orbitron';font-size:10px;letter-spacing:.22em;color:var(--dim);margin-bottom:8px}
.note-bl{font-size:13px;color:var(--cyan);padding:8px 12px;border:1px solid var(--line);border-radius:8px;margin:6px 0;cursor:pointer;transition:border-color .15s,background .15s}
.note-bl:hover{border-color:var(--cyan);background:color-mix(in srgb,var(--cyan) 8%,transparent)}
.note-cardmeta{display:flex;flex-wrap:wrap;align-items:center;gap:5px;margin-top:8px}
.note-folder{font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.04em;color:var(--amber);background:color-mix(in srgb,var(--amber) 12%,transparent);border:1px solid color-mix(in srgb,var(--amber) 32%,transparent);border-radius:6px;padding:2px 7px}

/* ── AGX Pay app ── */

.pay-row{display:flex;align-items:center;gap:12px;padding:12px 14px;margin:8px 0;border:1px solid var(--line);border-radius:var(--r-md);background:var(--row-grad);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
.pay-ico{flex:none;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;border:1px solid var(--line2)}
.pay-ico.in{color:var(--up);background:color-mix(in srgb,var(--up) 14%,transparent);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--up) 30%,transparent)}
.pay-ico.out{color:var(--down);background:color-mix(in srgb,var(--down) 14%,transparent);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--down) 30%,transparent)}
.pay-who{font-size:14px}
.pay-memo{font-size:12px;color:var(--dim);font-style:italic;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pay-time{font-family:'IBM Plex Mono';font-size:10px;color:var(--dim);margin-top:3px}
.pay-amt{flex:none;font-family:'IBM Plex Mono';font-size:16px;font-weight:600}

/* ── market list rows ── */
.row{display:flex;align-items:center;gap:12px;padding:13px 14px;margin:8px 0;border:1px solid var(--line);border-radius:var(--r-md);
  background:var(--row-grad);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  cursor:pointer;position:relative;overflow:hidden;transition:transform .12s,border-color .15s,box-shadow .2s,background-color .35s ease}
.row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--cyan),var(--vio));opacity:0;transition:opacity .2s}
.row:hover{transform:translateY(-1px);border-color:var(--line2);box-shadow:var(--shadow)}
.row:hover::before{opacity:.9}
.row:active{transform:scale(.995)}
.row .sym{font-family:'IBM Plex Mono';font-weight:600;font-size:14px;width:58px;flex:none;color:var(--cyan)}
.row .nm{flex:1;min-width:0}
.row .nm .n1{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .nm .n2{font-size:10px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}
.sparkwrap{flex:none;width:54px;height:22px;opacity:.92}
.spark{display:block;overflow:visible}
@media(max-width:360px){.sparkwrap{display:none}}
.row .pxc{text-align:right;font-family:'IBM Plex Mono'}
.row .pxc .p{font-size:14px;font-weight:600;border-radius:5px;padding:0 3px;margin:0 -3px}
.row .pxc .c{font-size:11px}

/* ── filter chips ── */
.chips{display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:12px 2px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;background:var(--chip-bg);color:var(--dim);border:1px solid var(--line);border-radius:var(--r-md);padding:7px 13px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);transition:color .15s,background .15s,border-color .15s}
.chip.on{color:#04201d;background:linear-gradient(180deg,#46f3e4,#1bcabf);border-color:transparent;box-shadow:0 6px 16px -8px rgba(54,239,224,.6),inset 0 1px 0 rgba(255,255,255,.4)}
.sect{display:flex;align-items:center;gap:10px;font-family:'Orbitron';font-size:10px;letter-spacing:.28em;color:var(--dim);margin:20px 0 8px;padding-left:10px;border-left:2px solid var(--amber)}
.sect::after{content:'';flex:1;height:1px;background:repeating-linear-gradient(90deg,var(--line2) 0,var(--line2) 4px,transparent 4px,transparent 8px)}
/* ── HUD instrument cluster (market pulse) ── */
.hud-tag{display:flex;align-items:center;gap:7px;font-family:'Orbitron';font-size:9px;letter-spacing:.24em;color:var(--dim);text-transform:uppercase}
.hud-dot{width:8px;height:8px;border-radius:50%;flex:none}
.hud-row{display:flex;align-items:center;gap:16px}
.hud-gauge{flex:none}
.hud-split{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
.hud-readout{position:relative;padding:8px 10px;border:1px solid var(--line);border-radius:0;background:var(--chip-bg);
  --ch:9px;clip-path:polygon(0 0,calc(100% - var(--ch)) 0,100% var(--ch),100% 100%,var(--ch) 100%,0 calc(100% - var(--ch)))}
.hud-readout::before{content:'';position:absolute;top:-1px;left:-1px;width:8px;height:8px;border-top:2px solid var(--bracket);border-left:2px solid var(--bracket);opacity:.7}
.hud-k{font-family:'Orbitron';font-size:8px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase}
.hud-v{font-family:'IBM Plex Mono';font-size:14px;font-weight:600;margin-top:2px}
.seg{display:flex;gap:2px;height:9px}
.seg span{flex:1;border-radius:1px;transform-origin:bottom;animation:segIn .4s ease both}
@keyframes segIn{from{opacity:0;transform:scaleY(.25)}to{opacity:1;transform:scaleY(1)}}
.gauge-prog{animation:gaugeIn 1.1s cubic-bezier(.2,.8,.2,1) both}
@keyframes gaugeIn{from{stroke-dashoffset:var(--c)}to{stroke-dashoffset:var(--off)}}
.g-ticks{transform-box:fill-box;transform-origin:center;animation:gspin 32s linear infinite}
@keyframes gspin{to{transform:rotate(360deg)}}
.blink{color:var(--cyan);animation:blink 1.1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
.hud-dot{animation:dotPulse 2.2s ease-in-out infinite}
@keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.35}}
.telemetry{font-family:'IBM Plex Mono';font-size:9px;letter-spacing:.08em;color:var(--dim);opacity:.75;margin-top:12px;padding-top:8px;border-top:1px solid var(--line);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* sweeping scan line across the viewport */
#scan-sweep{position:fixed;left:0;right:0;top:0;height:2px;z-index:9;pointer-events:none;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.22;
  box-shadow:0 0 14px color-mix(in srgb,var(--cyan) 70%,transparent);animation:sweep 7s linear infinite}
@keyframes sweep{0%{transform:translateY(0)}100%{transform:translateY(100vh)}}
@media (prefers-reduced-motion:reduce){.hud-dot,.g-ticks,.gauge-prog,.seg span,.blink,.regime-banner::after,.btn::after{animation:none}.gauge-prog{stroke-dashoffset:var(--off)}.seg span{opacity:1;transform:none}#scan-sweep{display:none}}

/* ── asset modal ── */
.modal-bg{position:fixed;inset:0;background:var(--scrim);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);z-index:50;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
.modal{background:var(--modal-grad);border:1px solid var(--line2);border-top:1px solid var(--hi);border-radius:0;width:100%;max-width:920px;
  max-height:92vh;max-height:92dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 18px calc(28px + env(safe-area-inset-bottom));
  -webkit-backdrop-filter:blur(30px) saturate(170%);backdrop-filter:blur(30px) saturate(170%);box-shadow:0 -30px 80px -30px rgba(0,0,0,.6);animation:sheetUp .32s cubic-bezier(.2,.8,.2,1);
  --ch:20px;clip-path:polygon(var(--ch) 0,calc(100% - var(--ch)) 0,100% var(--ch),100% 100%,0 100%,0 var(--ch))}
.grab{width:40px;height:4px;border-radius:999px;background:var(--grab);margin:0 auto 16px}
.bigpx{font-family:'IBM Plex Mono';font-size:32px;font-weight:600;letter-spacing:-.01em}
.ranges{display:flex;gap:5px;margin:12px 0}
.ranges button{background:var(--chip-bg);color:var(--dim);padding:7px 12px;font-family:'IBM Plex Mono';font-size:12px;border:1px solid var(--line);border-radius:10px;transition:all .15s}
.ranges button.on{color:#04201d;background:linear-gradient(180deg,#46f3e4,#1bcabf);font-weight:700;border-color:transparent;box-shadow:inset 0 1px 0 rgba(255,255,255,.4)}
canvas{width:100%;height:180px;display:block;touch-action:pan-y}
.tradebox{display:flex;gap:8px;margin-top:10px}
.kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
.kv b{font-family:'IBM Plex Mono'}

/* ── toasts ── */
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:96px;background:var(--toast-grad);border:1px solid var(--line2);
  color:var(--ink);padding:12px 18px;border-radius:14px;z-index:99;font-size:14px;max-width:90vw;text-align:center;
  -webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);box-shadow:var(--shadow),inset 0 1px 0 var(--hi),0 0 24px -8px color-mix(in srgb,var(--cyan) 40%,transparent)}
.toast.err{border-color:color-mix(in srgb,var(--down) 55%,transparent);box-shadow:var(--shadow),inset 0 1px 0 var(--hi),0 0 24px -8px color-mix(in srgb,var(--down) 45%,transparent)}

/* ── auth screen ── */
.auth{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth .card{width:100%;max-width:380px;padding:26px}
.auth h1{font-size:21px;color:var(--cyan);text-align:center;letter-spacing:.12em;text-shadow:var(--glow);line-height:1.3}
.auth .sub{text-align:center;color:var(--dim);font-size:10px;letter-spacing:.28em;margin:8px 0 22px;text-transform:uppercase}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;letter-spacing:.18em;color:var(--dim);margin-bottom:6px;font-family:'Orbitron';text-transform:uppercase}

/* ── stat cards ── */
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat{background:var(--glass-strong);border:1px solid var(--line2);border-radius:0;padding:14px;position:relative;overflow:hidden;-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);box-shadow:inset 0 1px 0 var(--hi);transition:background-color .35s ease;
  --ch:11px;clip-path:polygon(0 0,calc(100% - var(--ch)) 0,100% var(--ch),100% 100%,var(--ch) 100%,0 calc(100% - var(--ch)))}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--cyan),transparent);opacity:.6}
.stat .l{font-size:9px;letter-spacing:.2em;color:var(--dim);font-family:'Orbitron';text-transform:uppercase}
.stat .v{font-family:'IBM Plex Mono';font-size:18px;font-weight:600;margin-top:5px}

/* ── admin ── */
.admin-grid{display:grid;gap:14px}
.admin-grid h3{font-size:11px;letter-spacing:.22em;color:var(--amber);margin-bottom:12px;padding-left:10px;border-left:2px solid var(--amber);text-transform:uppercase}
.inline{display:flex;gap:8px;flex-wrap:wrap}
.inline>*{flex:1;min-width:110px}
/* operator management cards */
.opcard{border:1px solid var(--line2);border-radius:0;padding:14px;margin-bottom:12px;background:var(--row-grad);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);

.op-credits{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:8px}
.op-credits .btn{white-space:nowrap}
.op-two{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.op-danger{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line2)}
.op-label{font-family:'Orbitron';font-size:9px;letter-spacing:.22em;color:var(--dim);text-transform:uppercase;margin:16px 0 0;padding-left:2px}

.feed-item{padding:13px 14px;margin:8px 0;border:1px solid var(--line);border-radius:var(--r-md);background:var(--row-grad);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);transition:background-color .35s ease}

.lb-rank{font-family:'Orbitron';width:34px;color:var(--dim);flex:none;font-size:13px}

@media(min-width:700px){.modal-bg{align-items:center}.modal{border-radius:26px;max-width:560px}}

.iconfirm .ic-btns{display:flex;gap:10px;justify-content:center}

@keyframes cardIn{from{transform:translateY(14px) rotate(3deg);opacity:0}to{transform:none;opacity:1}}
@keyframes flipIn{0%{transform:rotateY(90deg);opacity:.4}100%{transform:rotateY(0);opacity:1}}

.lose-shake{animation:loseShake .3s ease 2;color:var(--down)}

.rl-strip{display:flex;will-change:transform}
.rl-cell{flex:none;width:56px;height:56px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono';font-weight:700;font-size:18px;border-right:1px solid var(--line)}
.rl-marker{position:absolute;left:50%;top:0;bottom:0;width:2px;background:var(--amber);transform:translateX(-1px);z-index:2;box-shadow:0 0 12px var(--amber)}
.sreel-row{display:flex;gap:8px;justify-content:center;margin:12px 0}
.sreel{width:66px;height:66px;overflow:hidden;border:1px solid var(--line2);border-radius:14px;background:var(--inset-bg)}
.sreel-col{display:flex;flex-direction:column;will-change:transform}
.sreel-col span{height:66px;flex:none;display:flex;align-items:center;justify-content:center;font-size:38px}
.h-roll-big{font-family:'IBM Plex Mono';font-size:42px;font-weight:600;text-align:center;padding:10px 0;letter-spacing:.06em}
@media (prefers-reduced-motion:reduce){.rl-strip,.sreel-col{transition:none!important}.pcard.deal,.pcard.flip,.win-flash,.lose-shake{animation:none}}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes sheetUp{from{transform:translateY(24px);opacity:.6}to{transform:none;opacity:1}}
@keyframes viewIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.viewin{animation:viewIn .34s cubic-bezier(.2,.7,.2,1)}
@keyframes flUp{0%{background:color-mix(in srgb,var(--up) 38%,transparent)}100%{background:transparent}}
@keyframes flDown{0%{background:color-mix(in srgb,var(--down) 38%,transparent)}100%{background:transparent}}
.flash-up{animation:flUp .8s ease-out}
.flash-down{animation:flDown .8s ease-out}
@media (prefers-reduced-motion:reduce){body::before{animation:none}.viewin,.flash-up,.flash-down,.modal,.modal-bg,.iconfirm,.iconfirm-bg{animation:none}}

/* ---------- deterministic price engine ---------- */
function h32(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
function rnd(seed,i){const x=Math.sin(seed*374761.393+i*668265.263)*43758.5453;return (x-Math.floor(x))*2-1}
function noise(seed,t){const i=Math.floor(t),f=t-i,u=f*f*(3-2*f);return rnd(seed,i)*(1-u)+rnd(seed,i+1)*u}

const NEG_BETA={VOLX:-1.1,PHRX:-0.45,PLAT:-0.3,SALV:-0.55,SECC:-0.25,AEON:-0.35,ICE:-0.2};
function mkAsset(sym,name,type,sector,base,opt){
  opt=opt||{};const seed=h32(sym);
  const h1=(rnd(seed,1)+1)/2, h2=(rnd(seed,2)+1)/2, h3=(rnd(seed,3)+1)/2;
  let vol=opt.vol!==undefined?opt.vol:(type==="B"?.004+h1*.012:type==="E"?.05+h1*.05:type==="C"?.07+h1*.20:type==="X"?.22+h1*.28:.09+h1*.13);
  let beta=type==="B"?(sym==="TNB10"?-.15:-.05):type==="C"?.4+h3*.6:type==="X"?1.1+h3*.9:.6+h3*.9;
  if(NEG_BETA[sym]!==undefined)beta=NEG_BETA[sym];
  // market cap (float): bigger cap = more liquid = tighter spread.
  // log-normal-ish spread of caps from ~50M to ~900B
  const capTier= type==="E"?8e10 : type==="B"?5e11 : type==="X"?2e9+h2*4e10 :
                 (a=>a)(3e8+Math.pow(h1,2)*8e11);
  return {sym,name,name0:name,type,sector,sector0:sector,base,seed,vol,
    trend:type==="B"?0:(h2-.48)*.30,beta,
    cap:capTier, bm:opt.bm||false,listed:opt.listed||0};
}

/* ---------- options math (Black-Scholes, r=0) ---------- */
function ncdf(x){const t=1/(1+.2316419*Math.abs(x)),d=.3989423*Math.exp(-x*x/2);
  let p=d*t*(.3193815+t*(-.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));return x>0?1-p:p}
function bsv(type,S,K,Tyr,sig){
  if(Tyr<=0)return Math.max(0,type==="C"?S-K:K-S);
  const sq=sig*Math.sqrt(Tyr),d1=(Math.log(S/K)+sig*sig/2*Tyr)/sq,d2=d1-sq;
  return type==="C"?S*ncdf(d1)-K*ncdf(d2):K*ncdf(-d2)-S*ncdf(-d1);
}
function osig(a){return Math.min(3,Math.max(.35,a.vol*5))}
function optVal(o){const a=BYSYM[o.sym];if(!a)return 0;
  return Math.max(0,bsv(o.type,px(o.sym),o.K,(o.exp-gameNow())/(365*864e5),osig(a)))}
function optsValue(u){return (u.opts||[]).reduce((v,o)=>v+optVal(o)*o.q,0)}

function fundamentals(a){

  const f={beta:a.beta,sigma:osig(a)};
  if(a.type==="S"){
    f.eps=a.base/(14+h*22)*(1+.25*noise(a.seed^41,gh/300));
    f.pe=p/f.eps;

  }else if(a.type==="E"){
    f.nav=p*(1+.004*noise(a.seed^77,gh/4));f.prem=(p/f.nav-1)*100;
    f.div=divAnnual(a);f.yld=f.div/p*100;

  let hi=-1/0,lo=1/0;const now=gameNow(),t0=Math.max(now-7776e6,CFG?CFG.epoch:0);
  for(let i=0;i<=48;i++){const v=priceAt(a,t0+(now-t0)*i/48);if(v>hi)hi=v;if(v<lo)lo=v}
  f.hi=hi;f.lo=lo;

function digestEvents(){

    end: regs[i+1]?gt(regs[i+1]):Infinity, seed:h32("rg"+gt(e))}));

function curRegime(){const now=gameNow();const r=REGIMES.find(r=>now>=r.start&&now<r.end);return r||{...REGIME_DEFS.neutral,k:"neutral"}}

function rawLp(a,tMs){
  const ep=CFG?CFG.epoch:0;
  const tH=(tMs-ep)/3.6e6;
  let lp=0;

  // ── two-layer price model ────────────────────────────────────────────
  //
  // Layer 1: SECULAR / FUNDAMENTAL VALUE
  //   A slow walk that can lock in a directional move for months.
  //   ~15% of stocks and all cryptos are "breakout" assets.
  //   ETFs and commodities drift slowly (index-like).
  //
  const hBreak=(rnd(a.seed^0xBEEF,3)+1)/2; // 0-1, fixed per asset
  const isBreakout=(a.type==="X")||(a.type==="S"&&hBreak>0.85);

  // "Phase" noise: one slow cycle (~1.5 yr period) that stays bullish or
  //  bearish for 6-12 months at a stretch — the core breakout mechanism.
  const phase = noise(a.seed^0xF00D, tH/2600);          // -1 … +1, ~108-day half-cycle
  const momentum = noise(a.seed^0xCAFE, tH/900);        // shorter momentum swings
  const tr = a.trend*tH/8760;                           // ANNUAL drift (±15%/yr)

  // secular contribution per asset class — calibrated so a typical year
  // gives most assets ±10-50%, breakouts up to ~+150%, crypto up to ~+300%
  let secular;
  if(a.type==="E"){
    secular = 0.10*phase + 0.05*momentum + tr;
  }else if(a.type==="C"){
    secular = 0.14*phase + 0.06*momentum + tr;
  }else if(a.type==="X"){
    const str = 0.40 + hBreak*0.55;                     // crypto: biggest runs
    secular = str*phase + 0.20*str*momentum + tr*2;
  }else if(isBreakout){
    const str = 0.30 + hBreak*0.40;                     // breakout stock
    secular = str*phase + 0.20*str*momentum + tr*1.5;
  }else{
    secular = 0.20*phase + 0.08*momentum + tr;          // normal stock
  }

  // Layer 2: SHORT-TERM NOISE with SECTOR CORRELATION
  //   ρ fraction of noise is shared across all assets in the same sector
  //   (same seed → same daily moves), the rest is idiosyncratic.
  //   Formula: ρ·sectorFactor + √(1-ρ²)·idioFactor preserves total variance.
  const rho = a.type==="S"?0.42:a.type==="X"?0.28:0.15; // stocks correlate most
  const ss  = h32("sec:"+a.sector);   // deterministic per sector
  const sectorF = 0.6*noise(ss,tH/36)+0.3*noise(ss^9973,tH/6)+0.15*noise(ss^311,tH);
  const idioF   = 0.6*noise(a.seed,tH/36)+0.3*noise(a.seed^9973,tH/6)+0.15*noise(a.seed^311,tH);
  const shortNoise = a.vol*(rho*sectorF + Math.sqrt(1-rho*rho)*idioF);
  const revertFrac = Math.min(tH/2160, 0.65);
  lp += secular + shortNoise*(1 - revertFrac);

  // Soft boundary: if log-price drifts beyond ±ln(30) (~30× from base),
  //   apply a hard elastic pull — prices can't go to zero or infinity.
  const soften = (x,cap)=>x>cap?cap+(x-cap)*0.15:x<-cap?-cap+(x+cap)*0.15:x;
  lp = soften(lp, Math.log(12));

  for(const r of REGIMES){
    const st=Math.max(r.start,ep), en=Math.min(tMs,r.end);
    if(en>st) lp+=a.beta*r.d*(en-st)/864e5;
    if(r.xv&&tMs>r.start){
      const t1=Math.min(tMs,r.end)/3.6e6/2, t0=r.start/3.6e6/2;
      lp+=a.beta*r.xv*3*(noise(a.seed^r.seed,t1)-noise(a.seed^r.seed,t0));
    }
  }
  for(const p of PUMPS){
    if(p.sym===a.sym&&tMs>p.at){
      const t=(tMs-p.at)/p.dur; // 0=start, 1=peak, 2=fully reverted
      lp+=p.mag*Math.max(0,t<1?t:2-t);
    }
  }
  for(const p of SPUMPS){
    if(p.sec===a.sector&&tMs>p.at){
      const t=(tMs-p.at)/p.dur;
      lp+=p.mag*Math.max(0,t<1?t:2-t);
    }
  }
  return lp;
}
// volume: shares traded in the last 24h (simulated, not stored)
function volSim(a,tMs){
  const tH=tMs/3.6e6;
  const reg=curRegime(),baseVol=a.base*200*(1+a.vol*4);
  // regime multiplier: crash/boom drive volume
  const regMult={neutral:1,bull:1.3,bear:1.5,boom:2.2,crash:3.1,volatile:2.0,calm:0.7}[reg.k]||1;
  // intraday pattern: high at open/close, low midday (using hour-of-day approximation)
  const hr=(tMs%(864e5))/3.6e6; // 0-24
  const dayPatt=1+0.5*Math.abs(Math.sin((hr-9)*Math.PI/6.5));
  // noise
  const noiseF=0.6+0.8*((rnd(a.seed^1337,Math.floor(tH/24))+1)/2);
  // pump spike
  let pumpMult=1;
  for(const p of PUMPS){if(p.sym===a.sym&&tMs>p.at&&tMs<p.at+p.dur)pumpMult=3.5}
  for(const p of SPUMPS){if(p.sec===a.sector&&tMs>p.at&&tMs<p.at+p.dur)pumpMult=Math.max(pumpMult,2.2)}
  return Math.round(baseVol*regMult*dayPatt*noiseF*pumpMult);
}

function etfLp(a,tMs){
  const syms=ETF_HOLDINGS[a.sym];
  if(!syms)return null; // VOLX falls through to normal simulation
  const ep=CFG?CFG.epoch:0;
  let sum=0,n=0;
  for(const sym of syms){const c=BYSYM[sym];if(c){sum+=rawLp(c,tMs);n++;}}
  if(!n)return null;
  // tracking error: ±0.4% slow noise
  const tH=(tMs-ep)/3.6e6;
  const te=0.004*noise(a.seed^0xE7F1,tH/96);
  // AGXT targets ~7%/yr log-drift (mirrors S&P 500 real return) on top of its basket
  const agxtBoost=a.sym==="AGXT"?Math.log(1.07)*tH/8760:0;
  return sum/n+te+agxtBoost;
}

const _lpRef={};
function clearLpRef(){Object.keys(_lpRef).forEach(k=>delete _lpRef[k]);}
function lpRef(a){
  const anchor=CFG&&CFG.priceAnchor?CFG.priceAnchor:(CFG?CFG.epoch:Date.now());
  if(_lpRef[a.sym]===undefined)
    _lpRef[a.sym]=a.type==="E"?(etfLp(a,anchor)||0):rawLp(a,anchor);
  return _lpRef[a.sym];
}
function priceAt(a,tMs){
  // Anchor: base price is always the current price.
  // History and future are expressed as deviation from that anchor.
  if(a.type==="B"){
    // bonds: steady appreciation at their yield + tiny noise, with a
    // gentle inverse-rate wobble. Anchored so current price = base.
    const anchor=CFG&&CFG.priceAnchor?CFG.priceAnchor:(CFG?CFG.epoch:tMs);
    const y=(BOND_YIELD[a.sym]!==undefined?BOND_YIELD[a.sym]:0.03);
    const yrs=(tMs-anchor)/(365*864e5);
    const wob=a.vol*0.5*noise(a.seed,(tMs-(CFG?CFG.epoch:0))/3.6e6/72);
    return a.base*Math.exp(y*yrs+wob);
  }
  if(a.type==="E"){
    const elp=etfLp(a,tMs);
    if(elp!==null) return a.base*Math.exp(elp-lpRef(a));
  }
  return a.base*Math.exp(rawLp(a,tMs)-lpRef(a));
}
const px=s=>priceAt(BYSYM[s],gameNow());
// ── bid/ask spread model ──────────────────────────────────────────────
// ── LEVEL-2 ORDER BOOK ENGINE ─────────────────────────────────────────
// A fully simulated depth ladder exists for every asset at all times and
// always governs fills (slippage). The GM toggle only controls whether an
// operator can SEE the depth (level-2 data), like paying for it IRL.
//
// half-spread: the inside spread (top of book), each side, as a fraction.
function halfSpread(a){
  if(!a)return 0;
  if(a.type==="B")return 0.0002;                  // 2 bps each side
  const capRef=a.cap||5e9;
  const liq=Math.max(0.12,Math.min(1,Math.log10(capRef)/12)); // 0.12..1
  let hs=(0.0008/liq)*(1+a.vol*3);                // tighter inside spread
  if(a.type==="X")hs*=1.6;
  if(a.bm)hs*=2.2;
  return Math.min(hs,0.03);
}
// Depth at the inside level, in CREDITS of notional. Log-scaled so even
// mega-caps have a finite, walkable book: a player-sized order barely
// moves it, but a whale or leveraged order causes real slippage.
function bookDepthUnit(a){
  const cap=a.cap||5e9;
  const t=Math.max(0,Math.min(1,(Math.log10(cap)-8.5)/(11.95-8.5))); // 0..1
  let unit=1500+t*38500;                 // ~1.5k (small) … ~40k (mega) credits
  if(a.type==="X")unit*=0.55;            // crypto books are thinner
  if(a.bm)unit*=0.35;                    // black market very thin
  if(a.type==="E")unit*=1.6;             // ETFs deep & liquid
  return unit;
}
// tick size between book levels, as a fraction of mid
function bookTick(a){
  return Math.max(halfSpread(a)*0.6, 0.0004);
}
// Build a deterministic N-level ladder around the mid for one side.
// Returns [{px, size(credits), cum(credits)}], worsening away from mid.
function bookLevels(sym,side,levels){       // side:+1 ask, -1 bid
  const a=BYSYM[sym],mid=px(sym),hs=halfSpread(a),tick=bookTick(a);
  const unit=bookDepthUnit(a),seed=a.seed^(side>0?0xA5C:0x5C3);
  const gh=(gameNow()-(CFG?CFG.epoch:0))/3.6e6;
  const out=[];let cum=0;
  for(let i=0;i<(levels||8);i++){
    // price walks out from the inside quote
    const lvlFrac=hs+i*tick;
    const p=mid*(1+side*lvlFrac);
    // size grows deeper into the book, with deterministic jitter
    const jitter=0.6+0.8*((noise(seed^(i*131),gh/24)+1)/2);
    const size=unit*Math.pow(1.45,i)*jitter;
    cum+=size;
    out.push({px:p,size,cum});
  }
  return out;
}
// Walk the book to fill `qty` shares on `side`. Returns {avgPx, filled, slip%}.
function fillThroughBook(sym,side,qty){
  const mid=px(sym);
  if(!qty||qty<=0)return {avgPx:mid,filled:0,slip:0};
  const levels=bookLevels(sym,side,14);
  let remain=qty,spent=0,filled=0;
  for(const lv of levels){
    const lvShares=lv.size/lv.px;             // convert credit-depth to shares
    const take=Math.min(remain,lvShares);
    spent+=take*lv.px;filled+=take;remain-=take;
    if(remain<=1e-9)break;
  }
  if(remain>1e-9){                            // ran out of book — worst level + penalty
    const last=levels[levels.length-1];
    const penaltyPx=last.px*(1+side*0.02);
    spent+=remain*penaltyPx;filled+=remain;
  }
  const avgPx=spent/filled;
  return {avgPx,filled:qty,slip:(avgPx/mid-1)*100*side};
}
// Execution price for a trade of `qty` shares (slippage-aware).
// Top-of-book single-share price (used for quotes/estimates).
function tradePx(sym,side){
  const a=BYSYM[sym],mid=px(sym);

async function supaReq(method, key, value) {
  const h = {
    "Content-Type": "application/json",
    "apikey": SUPA_ANON,
    "Authorization": "Bearer " + SUPA_ANON
  };
  if (method === "GET") {
    const r = await fetch(
      SUPA_URL + "/rest/v1/kv?key=eq." + encodeURIComponent(key) + "&select=value",
      { headers: h }
    );
    // throw on HTTP errors so callers can't mistake a server failure for
    // "key not found" — that confusion can overwrite shared state with defaults
    if (!r.ok) throw new Error("GET " + key + ": HTTP " + r.status);
    const d = await r.json();
    if (!Array.isArray(d)) throw new Error("GET " + key + ": bad response");
    return d[0] ? d[0].value : null;
  }
  if (method === "SET") {
    const r = await fetch(SUPA_URL + "/rest/v1/kv", {
      method: "POST",
      headers: { ...h, "Prefer": "resolution=merge-duplicates" },
      body: JSON.stringify({ key, value, updated_at: new Date().toISOString() })
    });
    return r.ok;
  }
  if (method === "DEL") {
    await fetch(
      SUPA_URL + "/rest/v1/kv?key=eq." + encodeURIComponent(key),
      { method: "DELETE", headers: h }
    );
    return true;
  }
  if (method === "LIST") {
    const r = await fetch(
      SUPA_URL + "/rest/v1/kv?key=like." + encodeURIComponent(key + "%") + "&select=key&limit=200",
      { headers: h }
    );
    const d = await r.json();
    return Array.isArray(d) ? d.map(x => x.key) : [];
  }
}

}
// radial dial gauge (HUD), theme-colored
function radialGauge(pct,centerTxt,sub,color){
  color=color||"var(--cyan)";
  const R=30,C=2*Math.PI*R,p=Math.max(0,Math.min(100,pct)),off=C*(1-p/100);
  const fs=String(centerTxt).length>5?11:String(centerTxt).length>3?13:16;
  let ticks="";
  for(let i=0;i<40;i++){const a=i/40*2*Math.PI,x1=42+34*Math.cos(a),y1=42+34*Math.sin(a),x2=42+38*Math.cos(a),y2=42+38*Math.sin(a);
    ticks+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="var(--line2)" stroke-width="${i%5===0?1.4:0.6}"/>`;}
  return `<svg width="84" height="84" viewBox="0 0 84 84" aria-hidden="true">
    <g class="g-ticks">${ticks}</g>
    <circle cx="42" cy="42" r="${R}" fill="none" stroke="var(--line)" stroke-width="5"/>
    <circle class="gauge-prog" cx="42" cy="42" r="${R}" fill="none" stroke="${color}" stroke-width="5" stroke-linecap="round"
      stroke-dasharray="${C.toFixed(1)}" transform="rotate(-90 42 42)"
      style="--c:${C.toFixed(1)};--off:${off.toFixed(1)};stroke-dashoffset:${off.toFixed(1)};filter:drop-shadow(0 0 4px ${color})"/>
    <text x="42" y="${40+(16-fs)*0.4}" text-anchor="middle" fill="var(--ink)" font-family="IBM Plex Mono" font-size="${fs}" font-weight="600">${centerTxt}</text>
    <text x="42" y="53" text-anchor="middle" fill="var(--dim)" font-family="Orbitron" font-size="6.5" letter-spacing="1.2">${sub}</text>
  </svg>`;
}
// segmented HUD bar (filled cells glow)
function segBar(pct,n){
  n=n||18;const filled=Math.round(Math.max(0,Math.min(100,pct))/100*n);
  let s="";for(let i=0;i<n;i++)s+=`<span style="animation-delay:${i*30}ms;background:${i<filled?"linear-gradient(180deg,var(--up),var(--cyan))":"var(--line)"};box-shadow:${i<filled?"0 0 6px color-mix(in srgb,var(--cyan) 45%,transparent)":"none"}"></span>`;
  return `<div class="seg">${s}</div>`;
}

/* ============ FIELD NOTES app ============
   Three notebooks behind a scope switch:
     · PRIVATE   — ME.notes, only you can see them
     · SHARED    — a collective operator notebook (server key "shnotes"); every
                   operator reads it, you may edit notes you authored
     · OPERATORS — GM-only, read-only browse of every player's private notes
   Notes group into folders ("missions"), and support markdown, [[cross-refs]],
   $TICKER links, tags, pinning, search and automatic backlinks. */
let NOTESEL=null, NOTEEDIT=false, NOTEQ="", NOTETAG=null, NOTESCOPE="private", NOTEFOLDER=null;
let SHNOTES=[];      // shared notebook cache
let GMNOTES=null;    // GM browse cache: [{op, notes:[...]}]
function notesArr(){if(!ME.notes)ME.notes=[];return ME.notes}
async function loadShared(){try{SHNOTES=(await SG.get("shnotes"))||[]}catch(e){SHNOTES=SHNOTES||[]}}
async function saveShared(){return await SG.set("shnotes",SHNOTES)}
async function loadGMNotes(){
  const keys=await SG.list("u:");
  const users=await Promise.all(keys.slice(0,80).map(k=>SG.get(k)));
  GMNOTES=users.filter(u=>u).map(u=>({op:u.n,notes:(u.notes||[]).map(n=>({...n,owner:u.n}))}))
    .filter(g=>g.notes.length).sort((a,b)=>a.op.localeCompare(b.op));
}
// the working array for the active scope
function scopeNotes(){
  if(NOTESCOPE==="shared")return SHNOTES;
  if(NOTESCOPE==="gm")return (GMNOTES||[]).flatMap(g=>g.notes);
  return notesArr();
}
function canEditNote(n){
  if(!n||NOTESCOPE==="gm")return false;
  if(NOTESCOPE==="shared")return !n.owner||n.owner===ME.n;
  return true;
}
// persist whichever notebook the active note lives in
function persistScope(){if(NOTESCOPE==="shared")return saveShared();return saveMe();}
function noteById(id){return scopeNotes().find(n=>n.id===id)||null}
function noteTitleMap(){const m={};for(const n of scopeNotes())m[(n.title||"").trim().toLowerCase()]=n.id;return m}
function noteUID(){return "n"+Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function plain(body){ // strip markdown for list snippets
  return String(body||"").replace(/[#>*`_~\-]/g," ").replace(/\[\[([^\]]+)\]\]/g,"$1").replace(/\[([^\]]+)\]\([^)]*\)/g,"$1").replace(/\s+/g," ").trim();
}
function allTags(){const s=new Set();for(const n of scopeNotes())(n.tags||[]).forEach(t=>s.add(t));return[...s].sort()}
function allFolders(){const s=new Set();for(const n of scopeNotes())if(n.folder)s.add(n.folder);return[...s].sort()}
function matchNote(n,q){return (n.title||"").toLowerCase().includes(q)||(n.body||"").toLowerCase().includes(q)||(n.tags||[]).some(t=>t.toLowerCase().includes(q))||(n.folder||"").toLowerCase().includes(q)||(n.owner||"").toLowerCase().includes(q)}

async function setNoteScope(s){
  if(s===NOTESCOPE&&!NOTESEL)return;
  NOTESCOPE=s;NOTESEL=null;NOTEEDIT=false;NOTEQ="";NOTETAG=null;NOTEFOLDER=null;
  const v=$("#view");if(v)v.innerHTML=`<div class="dim" style="padding:34px;text-align:center">Syncing notebook…</div>`;
  if(s==="shared")await loadShared();
  if(s==="gm")await loadGMNotes();
  renderTab();
}
function scopeTabsHTML(){
  const tabs=[["private","◈ PRIVATE"],["shared","⇪ SHARED"]];
  if(ADMIN)tabs.push(["gm","⚙ OPERATORS"]);
  return `<div class="chips" style="margin-top:12px">${tabs.map(t=>`<button class="chip ${NOTESCOPE===t[0]?"on":""}" onclick="setNoteScope('${t[0]}')">${t[1]}</button>`).join("")}</div>`;
}

function renderNotes(v){
  const sel=NOTESEL&&noteById(NOTESEL);
  if(sel)return renderNoteEditor(v,sel);
  if(NOTESCOPE==="gm")return renderGMNotes(v);

  let list=scopeNotes().filter(n=>{
    if(NOTEFOLDER!==null&&(n.folder||"")!==NOTEFOLDER)return false;
    if(NOTETAG&&!(n.tags||[]).includes(NOTETAG))return false;
    return !q||matchNote(n,q);
  });
  list.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||(b.updated||0)-(a.updated||0));

  v.innerHTML=`
    ${scopeTabsHTML()}
    <div class="card" style="margin-top:10px"><div class="hud-row">
      <div style="flex:1;min-width:0"><div class="hud-tag"><span class="hud-dot" style="background:${shared?"var(--up)":"var(--vio)"};box-shadow:0 0 8px ${shared?"var(--up)":"var(--vio)"}"></span>${shared?"SHARED OPERATOR NOTEBOOK":"PRIVATE FIELD NOTES"} · ${scopeNotes().length} ENTRIES</div>
        <div class="dim" style="font-size:11px;margin-top:6px">${shared?"Visible to all operators — you can edit notes you authored.":"Only you can read these. Use ⇪ on a note to publish it to the shared notebook."} Group with folders, link with <b>[[Title]]</b>.</div></div>
      <button class="btn vio" onclick="newNote()">+ NEW</button>

    <div class="chips" id="note-folderbar">
      <button class="chip ${NOTEFOLDER===null?"on":""}" onclick="setNoteFolder(null)">⊞ ALL</button>
      <button class="chip ${NOTEFOLDER===""?"on":""}" onclick="setNoteFolder('')">UNFILED</button>
      ${folders.map(f=>`<button class="chip ${NOTEFOLDER===f?"on":""}" onclick="setNoteFolder('${esc(f).replace(/'/g,"\\'")}')">🗂 ${esc(f)}</button>`).join("")}
    </div>
    ${tags.length?`<div class="chips">${[["",""]].concat(tags.map(t=>[t,t])).map(t=>
      `<button class="chip ${(NOTETAG||"")===t[0]?"on":""}" onclick="setNoteTag('${t[0]?esc(t[0]).replace(/'/g,"\\'"):""}')">${t[0]?"#"+esc(t[0]):"ALL TAGS"}</button>`).join("")}</div>`:""}
    <div id="note-list">${noteListHTML(list)}</div>`;
  $("#note-q").addEventListener("input",e=>{NOTEQ=e.target.value;
    const sub=scopeNotes().filter(n=>{
      if(NOTEFOLDER!==null&&(n.folder||"")!==NOTEFOLDER)return false;
      if(NOTETAG&&!(n.tags||[]).includes(NOTETAG))return false;
      const qq=NOTEQ.trim().toLowerCase();return !qq||matchNote(n,qq);})
      .sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||(b.updated||0)-(a.updated||0));
    const el=$("#note-list");if(el)el.innerHTML=noteListHTML(sub);});
}
function noteListHTML(list){
  if(list.length)return list.map(noteCard).join("");
  const empty=NOTESCOPE==="shared"?"No shared notes yet. Be the first to post one.":scopeNotes().length?"No notes match.":"No notes yet. Hit + NEW to start your logbook.";
  return `<div class="dim" style="padding:34px;text-align:center">${empty}</div>`;
}
function renderGMNotes(v){
  const groups=GMNOTES||[];
  const total=groups.reduce((s,g)=>s+g.notes.length,0);
  const q=NOTEQ.trim().toLowerCase();
  v.innerHTML=`
    ${scopeTabsHTML()}
    <div class="card" style="margin-top:10px;border-color:var(--amber)"><div class="hud-tag"><span class="hud-dot" style="background:var(--amber);box-shadow:0 0 8px var(--amber)"></span>GM OVERSIGHT · ${total} NOTES ACROSS ${groups.length} OPERATIVES</div>
      <div class="dim" style="font-size:11px;margin-top:6px">Read-only access to every operator's private logbook. ${total?"":"No operatives have written notes yet."}</div></div>
    <div style="padding-top:10px"><input id="note-q" placeholder="Search all operator notes…" value="${esc(NOTEQ)}"></div>
    <div id="note-list">${gmGroupsHTML(groups,q)}</div>`;
  $("#note-q").addEventListener("input",e=>{NOTEQ=e.target.value;const el=$("#note-list");if(el)el.innerHTML=gmGroupsHTML(groups,NOTEQ.trim().toLowerCase());});
}
function gmGroupsHTML(groups,q){
  let html="";
  for(const g of groups){
    const ns=g.notes.filter(n=>!q||matchNote(n,q)).sort((a,b)=>(b.updated||0)-(a.updated||0));
    if(!ns.length)continue;
    html+=`<div class="sect">${esc(g.op.toUpperCase())} · ${ns.length}</div>`+ns.map(noteCard).join("");
  }
  return html||`<div class="dim" style="padding:34px;text-align:center">No notes match.</div>`;
}
function noteCard(n){
  const snip=plain(n.body).slice(0,110);
  return `<div class="note-card" onclick="openNote('${n.id}')">
    <div class="note-card-h">
      ${n.pinned?`<span class="note-pin">📌</span>`:""}
      <div class="note-card-t">${esc(n.title||"Untitled note")}</div>
      <div class="note-card-time">${ago(n.updated||n.created||Date.now())}</div>
    </div>
    ${snip?`<div class="note-card-s">${esc(snip)}${plain(n.body).length>110?"…":""}</div>`:`<div class="note-card-s dim">Empty note</div>`}
    <div class="note-cardmeta">
      ${n.folder?`<span class="note-folder">🗂 ${esc(n.folder)}</span>`:""}
      ${n.owner&&NOTESCOPE!=="private"?`<span class="note-owner">@${esc(n.owner)}</span>`:""}
      ${(n.tags||[]).map(t=>`<span class="note-tag">#${esc(t)}</span>`).join("")}
    </div>
  </div>`;
}
function setNoteTag(t){NOTETAG=t||null;renderTab()}
function setNoteFolder(f){NOTEFOLDER=f;renderTab()}
function createNote(title){
  const n={id:noteUID(),title:title||"",body:"",tags:[],folder:(NOTEFOLDER||""),pinned:false,created:Date.now(),updated:Date.now()};
  if(NOTESCOPE==="shared"){n.owner=ME.n;SHNOTES.unshift(n);saveShared();}
  else{notesArr().unshift(n);saveMe();}
  NOTESEL=n.id;NOTEEDIT=true;renderTab();
}
function newNote(){if(NOTESCOPE!=="gm")createNote("");}
function openNote(id){if(!noteById(id))return;NOTESEL=id;NOTEEDIT=false;renderTab()}
function openNoteByTitle(title){
  const t=title.trim();const id=noteTitleMap()[t.toLowerCase()];
  if(id){openNote(id);return}
  if(NOTESCOPE==="gm")return;
  createNote(t);
}
function backToNotes(){commitNote();NOTESEL=null;NOTEEDIT=false;renderTab()}
// read the editor fields back into the selected note (no-op when not editing or read-only)
function commitNote(){
  const n=NOTESEL&&noteById(NOTESEL);if(!n||!canEditNote(n))return;
  const tEl=$("#note-title"),bEl=$("#note-body"),gEl=$("#note-tagsin"),fEl=$("#note-folder");
  if(!tEl&&!bEl)return; // not in edit mode
  const nt=tEl?tEl.value:n.title, nb=bEl?bEl.value:n.body;
  const ng=gEl?gEl.value.split(",").map(s=>s.trim().replace(/^#/,"")).filter(Boolean):n.tags;
  const nf=fEl?fEl.value.trim():(n.folder||"");
  if(nt!==n.title||nb!==n.body||JSON.stringify(ng)!==JSON.stringify(n.tags)||nf!==(n.folder||"")){
    n.title=nt;n.body=nb;n.tags=ng;n.folder=nf;n.updated=Date.now();persistScope();
  }
}
function saveNote(){commitNote();NOTEEDIT=false;renderTab();toast("Note saved.");}
function toggleNoteEdit(){if(NOTEEDIT)commitNote();NOTEEDIT=!NOTEEDIT;renderTab();}
function toggleNotePin(){const n=noteById(NOTESEL);if(!canEditNote(n))return;commitNote();n.pinned=!n.pinned;n.updated=Date.now();persistScope();renderTab();}
async function deleteNote(){
  const n=noteById(NOTESEL);if(!canEditNote(n))return;
  if(!await iconfirm("Delete “"+esc(n.title||"this note")+"” permanently?"))return;
  if(NOTESCOPE==="shared"){SHNOTES=SHNOTES.filter(x=>x.id!==n.id);await saveShared();}
  else{ME.notes=notesArr().filter(x=>x.id!==n.id);saveMe();}
  NOTESEL=null;NOTEEDIT=false;renderTab();toast("Note deleted.");
}
// publish a private note to the shared operator notebook (or update the published copy)
async function shareNote(){
  const n=noteById(NOTESEL);if(!n||NOTESCOPE!=="private")return;

// insert wrapping markdown around the textarea selection
function md(pre,suf,ph){
  const t=$("#note-body");if(!t)return;
  const s=t.selectionStart,e=t.selectionEnd,val=t.value,mid=val.slice(s,e)||ph;
  t.value=val.slice(0,s)+pre+mid+suf+val.slice(e);
  const cs=s+pre.length;t.focus();t.setSelectionRange(cs,cs+mid.length);
}
// insert a line-level prefix at the start of the current line
function mdLine(pre){
  const t=$("#note-body");if(!t)return;
  const val=t.value,s=t.selectionStart,ls=val.lastIndexOf("\n",s-1)+1;
  t.value=val.slice(0,ls)+pre+val.slice(ls);
  const np=s+pre.length;t.focus();t.setSelectionRange(np,np);
}
/* lightweight markdown + cross-reference renderer (escapes first, then formats) */
function mdRender(src){
  const tmap=noteTitleMap();
  const inline=s=>{
    s=esc(s);
    s=s.replace(/`([^`]+)`/g,(m,c)=>`<code>${c}</code>`);
    s=s.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
    s=s.replace(/(^|[^*])\*([^*\n]+)\*/g,"$1<em>$2</em>");
    // [[wiki cross-reference]]
    s=s.replace(/\[\[([^\]]+)\]\]/g,(m,t)=>{const key=t.trim().toLowerCase();const id=tmap[key];
      return id?`<a class="note-link" onclick="event.stopPropagation();openNote('${id}')">${t.trim()}</a>`
              :`<a class="note-link missing" onclick="event.stopPropagation();openNoteByTitle('${t.trim().replace(/'/g,"\\'")}')">${t.trim()}</a>`;});
    // [label](url) links
    s=s.replace(/\[([^\]]+)\]\(((https?:\/\/|\/)[^)\s]+)\)/g,'<a class="note-link" href="$2" target="_blank" rel="noopener">$1</a>');
    // $TICKER → live asset
    s=s.replace(/\$([A-Z]{2,6})\b/g,(m,sym)=>BYSYM[sym]?`<a class="note-link tick" onclick="event.stopPropagation();openAsset('${sym}')">$${sym}</a>`:m);
    return s;
  };
  const lines=String(src).replace(/\r/g,"").split("\n");
  let out="",i=0;
  while(i<lines.length){
    const ln=lines[i];
    if(/^\s*---\s*$/.test(ln)){out+="<hr>";i++;continue;}
    let h=ln.match(/^(#{1,4})\s+(.*)$/);
    if(h){const lv=h[1].length;out+=`<h${lv+1} class="note-h">${inline(h[2])}</h${lv+1}>`;i++;continue;}
    if(/^\s*[-*]\s+/.test(ln)){let items="";while(i<lines.length&&/^\s*[-*]\s+/.test(lines[i])){items+=`<li>${inline(lines[i].replace(/^\s*[-*]\s+/,""))}</li>`;i++;}out+=`<ul>${items}</ul>`;continue;}
    if(/^\s*\d+\.\s+/.test(ln)){let items="";while(i<lines.length&&/^\s*\d+\.\s+/.test(lines[i])){items+=`<li>${inline(lines[i].replace(/^\s*\d+\.\s+/,""))}</li>`;i++;}out+=`<ol>${items}</ol>`;continue;}
    if(/^\s*>\s?/.test(ln)){let q="";while(i<lines.length&&/^\s*>\s?/.test(lines[i])){q+=inline(lines[i].replace(/^\s*>\s?/,""))+" ";i++;}out+=`<blockquote>${q.trim()}</blockquote>`;continue;}
    if(/^\s*$/.test(ln)){i++;continue;}
    const para=[ln];while(i+1<lines.length&&!/^\s*$/.test(lines[i+1])&&!/^(#{1,4}\s|\s*[-*]\s|\s*\d+\.\s|\s*>|\s*---\s*$)/.test(lines[i+1])){para.push(lines[i+1]);i++;}
    out+=`<p>${para.map(inline).join("<br>")}</p>`;i++;
  }
  return out;
}

function payQuick(a){const el=$("#pay-amt");const cur=parseFloat(el&&el.value)||0;PAYAMT=String(Math.round((cur+a)*100)/100);if(el)el.value=PAYAMT;}
async function sendMoney(){
  if(PAYBUSY)return;
  const to=($("#pay-to")||{}).value||PAYTO;
  const amt=Math.round((parseFloat(($("#pay-amt")||{}).value||PAYAMT)||0)*100)/100;
  const memo=(($("#pay-memo")||{}).value||PAYMEMO||"").trim().slice(0,80);
  if(!to)return toast("Pick a recipient.",true);
  if(to===ME.n)return toast("You can't pay yourself.",true);
  if(!isFinite(amt)||amt<=0)return toast("Enter a valid amount.",true);
  if(amt>ME.cash+1e-9)return toast("Insufficient credits.",true);
  if(!await iconfirm("Send "+fmt(amt)+" to "+esc(to)+"?"+(memo?"<br><span style='color:var(--dim)'>“"+esc(memo)+"”</span>":"")))return;
  PAYBUSY=true;const btn=$("#pay-send");if(btn){btn.disabled=true;btn.textContent="SENDING…"}
  const key="u:"+to.toLowerCase().replace(/[^a-z0-9_-]/g,"_");
  let dest;try{dest=await SG.get(key);}catch(e){dest=null;}
  if(!dest){PAYBUSY=false;return toast("Recipient not found.",true);}
  // debit sender first and persist
  const now=Date.now(),g=gameNow();
  ME.cash-=amt;ME.hist=ME.hist||[];ME.hist.push({side:"PAY",d:-amt,with:to,memo,at:now,g});
  const okMe=await saveMe();
  if(!okMe){ME.cash+=amt;ME.hist.pop();PAYBUSY=false;return toast("Transfer failed — credits returned.",true);}
  // credit recipient on the freshest copy
  dest.cash=(dest.cash||0)+amt;dest.hist=dest.hist||[];dest.hist.push({side:"PAY",d:amt,with:ME.n,memo,at:now,g});
  const okDest=await SG.set(key,dest);
  if(!okDest){ // roll the sender back
    ME.cash+=amt;ME.hist.pop();await saveMe();PAYBUSY=false;
    return toast("Recipient unreachable — credits returned.",true);
  }
  PAYBUSY=false;PAYAMT="";PAYMEMO="";
  toast("Sent "+fmt(amt)+" to "+to+".");
  snapshotEq();if(TAB==="pay")renderTab();
}

/* ---------- charts ---------- */
function drawChart(canvas,pts,color){
  const dpr=window.devicePixelRatio||1, w=canvas.clientWidth||320, h=canvas.clientHeight||180;
  canvas.width=w*dpr;canvas.height=h*dpr;
  const x=canvas.getContext("2d");x.scale(dpr,dpr);x.clearRect(0,0,w,h);
  if(!pts||pts.length<2)return;
  let mn=Math.min(...pts),mx=Math.max(...pts);if(mx-mn<1e-9){mx+=1;mn-=1}
  const pad=10,X=i=>pad+(w-2*pad)*i/(pts.length-1),Y=p=>h-pad-(h-2*pad)*(p-mn)/(mx-mn);
  let col=color||(pts[pts.length-1]>=pts[0]?(cssVar("--up")||"#34E2A2"):(cssVar("--down")||"#FF5C7C"));
  if(!/^#/.test(col))col=col||"#34E2A2";
  const hex6=/^#[0-9a-fA-F]{6}$/.test(col);
  const g=x.createLinearGradient(0,0,0,h);
  g.addColorStop(0,hex6?col+"55":col);g.addColorStop(1,hex6?col+"00":"transparent");
  x.beginPath();x.moveTo(X(0),Y(pts[0]));for(let i=1;i<pts.length;i++)x.lineTo(X(i),Y(pts[i]));
  x.strokeStyle=col;x.lineWidth=2;x.lineJoin="round";x.shadowColor=col;x.shadowBlur=8;x.stroke();x.shadowBlur=0;
  x.lineTo(X(pts.length-1),h);x.lineTo(X(0),h);x.closePath();x.fillStyle=g;x.fill();
  x.fillStyle=cssVar("--dim")||"#8294B8";x.font="10px IBM Plex Mono";
  x.fillText(fmt(mx),pad,12);x.fillText(fmt(mn),pad,h-3);
}

function attachHover(cv,pts,t0,t1,color){
  const redraw=()=>drawChart(cv,pts,color);
  cv.onpointerenter=()=>{cv._hov=true};
  cv.onpointermove=e=>{
    cv._hov=true;
    const r=cv.getBoundingClientRect(),fr=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));
    const i=Math.round(fr*(pts.length-1)),t=t0+(t1-t0)*i/(pts.length-1),p=pts[i];
    redraw();
    const ctx=cv.getContext("2d"),w=cv.clientWidth,h=cv.clientHeight,pad=10;
    let mn=Math.min(...pts),mx=Math.max(...pts);if(mx-mn<1e-9){mx+=1;mn-=1}
    const X=pad+(w-2*pad)*i/(pts.length-1),Y=h-pad-(h-2*pad)*(p-mn)/(mx-mn);
    ctx.strokeStyle=cssVar("--line2")||"rgba(155,184,235,.25)";ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(X,0);ctx.lineTo(X,h);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle=cssVar("--ink")||"#E8EFFF";ctx.beginPath();ctx.arc(X,Y,3.5,0,7);ctx.fill();
    const lbl=fmt(p)+"  "+gdate(t,true);
    ctx.font="11px IBM Plex Mono";const tw=ctx.measureText(lbl).width;
    const tx=Math.min(Math.max(X-tw/2,4),w-tw-8);
    ctx.fillStyle=cssVar("--chart-label-bg")||"rgba(10,16,32,.9)";ctx.fillRect(tx-4,2,tw+8,16);
    ctx.fillStyle=cssVar("--cyan")||"#36EFE0";ctx.fillText(lbl,tx,14);
  };
  cv.onpointerleave=()=>{cv._hov=false;redraw()};
}

function sig3(x){const m=Math.pow(10,Math.floor(Math.log10(Math.abs(x)))-2);return Math.round(x/m)*m}
function fundRows(a){

    const y=(BOND_YIELD[a.sym]!==undefined?BOND_YIELD[a.sym]:0.03);
    r.push(["Annual yield",(y*100).toFixed(2)+"%"],
           ["Type","Algalterian sovereign debt"],

           ["Bid / Ask spread","~0.04% (deep liquidity)"]);
    return r.map(x=>`<div class="kv"><span class="dim">${x[0]}</span><b>${x[1]}</b></div>`).join("");
  }
  if(f.pe!==undefined)r.push(["P/E ratio",f.pe>0&&f.pe<999?f.pe.toFixed(1):"—"],["EPS (ttm)",fmt(f.eps)]);
  if(f.nav!==undefined){

    r.push(["NAV / share",fmt(f.nav)],
           ["Premium to NAV",hasComp?"~0% (index fund)":pct(f.prem)],

  }
  if(f.yld!==undefined)r.push(["Dividend yield",f.div?f.yld.toFixed(2)+"%":"—"]);
  const vol24=volSim(a,gameNow());
  const ba=bidAsk(a.sym);
  r.push(["Market cap",fmtCap(a.cap)],
    ["Bid / Ask",fmt(ba.bid)+" / "+fmt(ba.ask)],
    ["Spread",(ba.hs*200).toFixed(2)+"%"],
    ["Beta (regime sensitivity)",f.beta.toFixed(2)],["Implied volatility",(f.sigma*100).toFixed(0)+"%"],
    ["24h Volume",vol24>1e6?(vol24/1e6).toFixed(2)+"M":vol24>1e3?(vol24/1e3).toFixed(1)+"K":vol24.toString()],
    ["90-day range",fmt(f.lo)+" – "+fmt(f.hi)]);
  return r.map(x=>`<div class="kv"><span class="dim">${x[0]}</span><b>${x[1]}</b></div>`).join("");

async function buyOption(sym){

    q=parseInt($("#o-qty").value);

  await refreshMe();
  const a=BYSYM[sym],prem=Math.max(.01,bsv(type,px(sym),K,d/365,osig(a))),cost=prem*q;
  const useOptMargin=USEMARGIN;
  if(useOptMargin){
    if(cost>marginBuyingPower(ME)+1e-9)return toast("Exceeds margin buying power ("+fmt(marginBuyingPower(ME))+").",true);
    if(maxLeverage()<=1)return toast("Margin trading is disabled by the GM.",true);
    const fromCash=Math.min(ME.cash,cost),borrowed=Math.max(0,cost-fromCash);
    if((ME.margin||0)<=0.01&&borrowed>0)ME.lastInt=gameNow();
    ME.cash-=fromCash;ME.margin=(ME.margin||0)+borrowed;
  }else{
    if(cost>ME.cash+1e-9)return toast("Insufficient credits. Toggle MARGIN ON to borrow.",true);
    ME.cash-=cost;
  }
  ME.opts=ME.opts||[];
  ME.opts.push({id:Date.now()+"_"+Math.floor(Math.random()*1e4),sym,type,K,q,prem,exp:gameNow()+d*864e5,at:Date.now(),g:gameNow()});
  ME.hist=ME.hist||[];ME.hist.push({at:Date.now(),g:gameNow(),sym,side:"OBUY",q,p:prem,o:type+" "+fmt(K)});
  if(!await saveMe())return toast("Order failed to sync.",true);

  oQuote();paintModal();
}

async function shortTrade(sym,dir){
  if(HALTED)return toast("Trading is halted.",true);
  let q=parseFloat($("#qty").value);
  if(!q||q<=0)return toast("Enter an amount in the quantity box.",true);
  await refreshMe();
  const p=px(sym),f=feeFrac();
  if(BUYMODE==="cr")q=Math.floor(q/(p*(dir>0?(1-f):(1+f)))*1e6)/1e6;
  if(q<=0)return toast("Amount too small.",true);
  ME.sh=ME.sh||{};const pos=ME.sh[sym]||{q:0,c:0};
  if(dir>0){ // open short: SELL into the book (bid side), receive proceeds
    const pEff=fillThroughBook(sym,-1,q).avgPx*(1-f),proceeds=q*pEff;
    pos.q+=q;pos.c+=proceeds;ME.cash+=proceeds;ME.sh[sym]=pos;
    if(netWorth(ME)<0.5*shortLiab(ME)){ // revert
      pos.q-=q;pos.c-=proceeds;ME.cash-=proceeds;
      if(pos.q<=1e-9)delete ME.sh[sym];
      return toast("Insufficient margin — net worth must cover 50% of short exposure.",true);
    }
    ME.hist.push({at:Date.now(),g:gameNow(),sym,side:"SHORT",q,p:pEff});
    if(!await saveMe())return toast("Order failed to sync.",true);
    toast("Shorted "+(+q.toFixed(4))+" "+sym+" @ "+fmt(pEff));
  }else{ // cover
    if(q>pos.q+1e-9)q=pos.q;
    if(q<=0)return toast("No short to cover.",true);
    const pEff=fillThroughBook(sym,1,q).avgPx*(1+f),cost=q*pEff;
    if(cost>ME.cash+1e-9)return toast("Insufficient credits to cover.",true);
    ME.cash-=cost;pos.c-=pos.c*(q/pos.q);pos.q-=q;
    if(pos.q<=1e-9)delete ME.sh[sym];else ME.sh[sym]=pos;
    ME.hist.push({at:Date.now(),g:gameNow(),sym,side:"COVER",q,p:pEff});
    if(!await saveMe())return toast("Order failed to sync.",true);
    toast("Covered "+(+q.toFixed(4))+" "+sym+" @ "+fmt(pEff));
  }
  paintModal();
}

async function housekeeping(){
  if(!ME)return;let dirty=false;const now=gameNow(),f=feeFrac();
  /* --- dividend accrual (pays when >= 1 credit; shorts owe dividends) --- */
  const lastDiv=ME.lastDiv!==undefined?ME.lastDiv:(ME.g0!==undefined?ME.g0:now);
  if(now>lastDiv){
    const dtY=(now-lastDiv)/(365*864e5);let acc=0;
    for(const sm in ME.hold||{}){const a=BYSYM[sm];if(a)acc+=ME.hold[sm].q*divAnnual(a)*dtY}
    for(const sm in ME.sh||{}){const a=BYSYM[sm];if(a)acc-=ME.sh[sm].q*divAnnual(a)*dtY}
    if(Math.abs(acc)>=1){
      ME.cash+=acc;ME.lastDiv=now;
      ME.hist.push({at:Date.now(),g:now,side:"DIV",d:acc});
      toast("Dividends "+(acc>=0?"received: +":"owed on shorts: ")+fmt(acc));dirty=true;
    }
  }
  /* --- limit / stop order fills (samples the path since placement) --- */
  if((ME.orders||[]).length){
    for(let i=ME.orders.length-1;i>=0;i--){
      const o=ME.orders[i],a=BYSYM[o.sym];if(!a){ME.orders.splice(i,1);dirty=true;continue}
      const t0=o.pg,steps=40;let hit=false,fillPx=o.trig;
      if(now>t0)for(let k=0;k<=steps;k++){
        const pp=priceAt(a,t0+(now-t0)*k/steps);
        if(o.side==="B"&&o.kind==="L"&&pp<=o.trig){hit=true;fillPx=pp;break}
        if(o.side==="B"&&o.kind==="T"&&pp>=o.trig){hit=true;fillPx=pp;break}
        if(o.side==="S"&&o.kind==="L"&&pp>=o.trig){hit=true;fillPx=pp;break}
        if(o.side==="S"&&o.kind==="T"&&pp<=o.trig){hit=true;fillPx=pp;break}
      }
      if(!hit)continue;
      const lbl=(o.kind==="L"?"LIMIT":"STOP")+" FILL";
      if(o.side==="B"){
        const pEff=fillPx*(1+f);let q=o.q;
        if(q*pEff>ME.cash)q=Math.floor(ME.cash/pEff*1e6)/1e6;
        if(q>1e-9){
          ME.cash-=q*pEff;ME.hold=ME.hold||{};const pos=ME.hold[o.sym]||{q:0,c:0};
          pos.q+=q;pos.c+=q*pEff;ME.hold[o.sym]=pos;
          ME.hist.push({at:Date.now(),g:now,sym:o.sym,side:"BUY",q,p:pEff,o:lbl});
          toast(lbl+": bought "+(+q.toFixed(4))+" "+o.sym+" @ "+fmt(pEff));
        }else ME.hist.push({at:Date.now(),g:now,sym:o.sym,side:"OFAIL",q:o.q,p:o.trig,o:"NO CREDITS"});
      }else{
        const pEff=fillPx*(1-f),held=(ME.hold&&ME.hold[o.sym])?ME.hold[o.sym].q:0,q=Math.min(o.q,held);
        if(q>1e-9){
          const pos=ME.hold[o.sym];ME.cash+=q*pEff;pos.c-=pos.c*(q/pos.q);pos.q-=q;
          if(pos.q<=1e-9)delete ME.hold[o.sym];
          ME.hist.push({at:Date.now(),g:now,sym:o.sym,side:"SELL",q,p:pEff,o:lbl});
          toast(lbl+": sold "+(+q.toFixed(4))+" "+o.sym+" @ "+fmt(pEff));
        }else ME.hist.push({at:Date.now(),g:now,sym:o.sym,side:"OFAIL",q:o.q,p:o.trig,o:"NO SHARES"});
      }
      ME.orders.splice(i,1);dirty=true;
    }
  }
  /* --- margin interest accrual (game-time based, batched) --- */
  if((ME.margin||0)>0.01){
    const last=(ME.lastInt!==undefined)?ME.lastInt:now;
    const dtY=Math.max(0,(now-last)/(365*864e5));
    const interest=ME.margin*marginRate()*dtY;
    // only post an entry once accrued interest reaches >= 1 credit, to avoid
    // spamming the log at high time-compression. cash is charged at posting.
    if(interest>=1){
      ME.cash-=interest;ME.lastInt=now;
      ME.hist.push({at:Date.now(),g:now,side:"INT",d:-interest});
      if(interest>50)toast("Margin interest charged: "+fmt(interest),true);
      dirty=true;
    }
  }else if(ME.margin<=0.01&&ME.lastInt!==undefined){
    // no debt — reset the clock so interest doesn't accumulate while debt-free
    ME.lastInt=now;
  }
  /* --- margin call: net worth < 25% of total long exposure --- */
  const longExp=Object.keys(ME.hold||{}).reduce((v,sm)=>v+(BYSYM[sm]?ME.hold[sm].q*px(sm):0),0);
  if((ME.margin||0)>0&&netWorth(ME)<0.25*longExp){
    // force-sell all holdings to repay debt
    for(const sm in ME.hold){const a=BYSYM[sm];if(!a)continue;
      const pEff=px(sm)*(1-feeFrac()),proceeds=ME.hold[sm].q*pEff;
      ME.hist.push({at:Date.now(),g:now,sym:sm,side:"SELL",q:ME.hold[sm].q,p:pEff,o:"MARGIN CALL"});
      const repay=Math.min(ME.margin,proceeds);ME.margin-=repay;ME.cash+=proceeds-repay;
      delete ME.hold[sm];}
    ME.margin=0;dirty=true;
    toast("⚠ MARGIN CALL — all positions liquidated to repay loan.",true);
  }
  /* --- margin call: forced cover of all shorts --- */
  const liab=shortLiab(ME);
  if(liab>0&&netWorth(ME)<0.25*liab){
    for(const sm in ME.sh){
      const q=ME.sh[sm].q,pEff=px(sm)*(1+f);
      ME.cash-=q*pEff;
      ME.hist.push({at:Date.now(),g:now,sym:sm,side:"COVER",q,p:pEff,o:"MARGIN CALL"});
    }
    ME.sh={};dirty=true;
    toast("\u26A0 MARGIN CALL — all short positions force-covered at market.",true);
  }
  if(dirty)await saveMe();
}

function l2BookHTML(sym){
  const asks=bookLevels(sym,1,8),bids=bookLevels(sym,-1,8);
  const maxCum=Math.max(asks[asks.length-1].cum,bids[bids.length-1].cum);
  const row=(lv,side)=>{
    const w=Math.max(4,Math.min(100,lv.cum/maxCum*100));
    const col=side>0?"rgba(255,92,122,.16)":"rgba(66,229,150,.16)";
    const tc=side>0?"var(--down)":"var(--up)";
    const sz=lv.size>=1e6?(lv.size/1e6).toFixed(2)+"M":lv.size>=1e3?(lv.size/1e3).toFixed(0)+"K":Math.round(lv.size);
    return `<div style="position:relative;display:flex;justify-content:space-between;font-family:'IBM Plex Mono';font-size:11px;padding:3px 6px;border-bottom:1px solid var(--line)">
      <div style="position:absolute;top:0;bottom:0;${side>0?"right":"left"}:0;width:${w}%;background:${col}"></div>
      <span style="position:relative;color:${tc}">${fmt(lv.px)}</span>
      <span style="position:relative" class="dim">\u20A2${sz}</span></div>`;
  };
  // asks shown high→low (worst at top), then bids low→high
  return `<div style="border:1px solid var(--line);border-radius:8px;overflow:hidden">
    ${asks.slice().reverse().map(l=>row(l,1)).join("")}
    <div style="text-align:center;font-family:'IBM Plex Mono';font-size:12px;font-weight:600;padding:5px;background:var(--panel2);color:var(--amber)">${fmt(px(sym))} MID</div>
    ${bids.map(l=>row(l,-1)).join("")}
  </div>
  <div class="dim" style="font-size:10px;margin-top:5px">Bars show cumulative resting size. Large orders walk this book and fill at progressively worse prices (slippage).</div>`;
}
