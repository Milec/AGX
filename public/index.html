<!DOCTYPE html>
<html lang="en">
<head>

<title>Algalterian Galactic Exchange</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06080F; --panel:#0D1322; --panel2:#111A30; --line:#1D2A47;
  --ink:#E8EEFF; --dim:#8A97B8;
  --cyan:#3FE0D0; --amber:#FFB454; --vio:#9D7BFF;
  --up:#42E596; --down:#FF5C7A;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:'Space Grotesk',-apple-system,BlinkMacSystemFont,sans-serif;font-size:15px;
  background-image:radial-gradient(1200px 500px at 70% -10%, rgba(63,224,208,.07), transparent 60%),
  radial-gradient(900px 400px at 10% 110%, rgba(157,123,255,.06), transparent 60%);}
.mono{font-family:'IBM Plex Mono',monospace}
h1,h2,h3,.disp{font-family:'Orbitron',sans-serif;letter-spacing:.06em}
.up{color:var(--up)} .down{color:var(--down)} .dim{color:var(--dim)} .amber{color:var(--amber)} .cyan{color:var(--cyan)}
button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;font-size:14px}
input,select{font-family:'IBM Plex Mono',monospace;background:#0A1020;border:1px solid var(--line);color:var(--ink);
  border-radius:8px;padding:10px 12px;font-size:16px;width:100%}
input:focus,select:focus{outline:2px solid var(--cyan);border-color:transparent}
.btn{background:var(--cyan);color:#04221E;font-weight:700;padding:11px 18px}
.btn.ghost{background:transparent;color:var(--cyan);border:1px solid var(--cyan)}
.btn.amber{background:var(--amber);color:#2A1A00}
.btn.red{background:var(--down);color:#2A0008}
.btn.vio{background:var(--vio);color:#170A33}
.btn:disabled{opacity:.4;cursor:not-allowed}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
.wrap{max-width:920px;margin:0 auto;padding:0 12px 90px}

/* header */
header{position:sticky;top:0;z-index:30;background:rgba(6,8,15,.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.hbar{max-width:920px;margin:0 auto;display:flex;align-items:center;gap:10px;padding:10px 12px}
.logo{font-family:'Orbitron';font-weight:900;font-size:15px;color:var(--cyan);line-height:1}
.logo small{display:block;font-size:9px;color:var(--dim);letter-spacing:.3em;font-weight:500}
.hnw{margin-left:auto;text-align:right}
.hnw .v{font-family:'IBM Plex Mono';font-weight:600;font-size:15px}
.hnw .l{font-size:10px;color:var(--dim);letter-spacing:.15em}
.scan{height:2px;background:linear-gradient(90deg,transparent,var(--cyan),var(--vio),transparent);opacity:.7}
.gclk{font-family:'IBM Plex Mono';font-size:10.5px;color:var(--dim);text-align:center;padding:3px 0;border-bottom:1px solid var(--line);letter-spacing:.08em}
nav{padding-left:max(2px,env(safe-area-inset-left));padding-right:max(2px,env(safe-area-inset-right))}
nav button{flex:1 1 0;min-width:0;font-size:9px;padding:9px 1px;letter-spacing:.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bm-tag{color:var(--down)!important}

/* ticker */
.ticker{overflow:hidden;border-bottom:1px solid var(--line);background:#080D1A;white-space:nowrap}
.ticker-inner{display:inline-block;padding:6px 0;font-family:'IBM Plex Mono','SF Mono','Menlo',monospace;font-size:12px;animation:tk 45s linear infinite}
@keyframes tk{from{transform:translateX(100vw)}to{transform:translateX(-100%)}}
@media (prefers-reduced-motion: reduce){.ticker-inner{animation:none}}
.ticker b{color:var(--amber);font-weight:600}
.regime-banner{padding:7px 12px;text-align:center;font-family:'Orbitron';font-size:11px;letter-spacing:.2em;border-bottom:1px solid var(--line)}
.halt-banner{padding:8px 12px;text-align:center;font-family:'Orbitron';font-size:12px;letter-spacing:.2em;background:rgba(255,92,122,.15);color:var(--down);border-bottom:1px solid var(--down)}

/* nav */
nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:rgba(8,11,20,.96);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
nav button{background:none;color:var(--dim);font-size:11px;letter-spacing:.08em;padding:8px 10px;font-family:'Orbitron'}
nav button.on{color:var(--cyan);text-shadow:0 0 12px rgba(63,224,208,.6)}

/* tables */
.row{display:flex;align-items:center;gap:10px;padding:12px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.row:active{background:rgba(63,224,208,.05)}
.row .sym{font-family:'IBM Plex Mono';font-weight:600;font-size:14px;width:58px;flex:none}
.row .nm{flex:1;min-width:0}
.row .nm .n1{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .nm .n2{font-size:10px;color:var(--dim);letter-spacing:.1em}
.row .pxc{text-align:right;font-family:'IBM Plex Mono'}
.row .pxc .p{font-size:14px;font-weight:600}
.row .pxc .c{font-size:11px}
.chips{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:10px 0;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;background:var(--panel2);color:var(--dim);border:1px solid var(--line);border-radius:999px;padding:6px 14px;font-size:12px}
.chip.on{color:var(--cyan);border-color:var(--cyan)}
.sect{font-family:'Orbitron';font-size:11px;letter-spacing:.25em;color:var(--dim);margin:18px 0 6px}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(3,5,10,.8);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:18px 18px 0 0;width:100%;max-width:920px;
  max-height:92vh;max-height:92dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 16px calc(24px + env(safe-area-inset-bottom))}
.grab{width:42px;height:4px;border-radius:4px;background:var(--line);margin:0 auto 14px}
.bigpx{font-family:'IBM Plex Mono';font-size:30px;font-weight:600}
.ranges{display:flex;gap:6px;margin:10px 0}
.ranges button{background:var(--panel2);color:var(--dim);padding:6px 12px;font-family:'IBM Plex Mono';font-size:12px}
.ranges button.on{color:#04221E;background:var(--cyan);font-weight:600}
canvas{width:100%;height:180px;display:block;touch-action:none}
.tradebox{display:flex;gap:8px;margin-top:10px}
.kv{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
.kv b{font-family:'IBM Plex Mono'}

.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:80px;background:var(--panel2);border:1px solid var(--cyan);
  color:var(--ink);padding:12px 18px;border-radius:10px;z-index:99;font-size:14px;max-width:90vw;text-align:center}
.toast.err{border-color:var(--down)}

/* auth */
.auth{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth .card{width:100%;max-width:380px}
.auth h1{font-size:20px;color:var(--cyan);text-align:center}
.auth .sub{text-align:center;color:var(--dim);font-size:11px;letter-spacing:.25em;margin:6px 0 20px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;letter-spacing:.15em;color:var(--dim);margin-bottom:5px;font-family:'Orbitron'}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px}
.stat .l{font-size:10px;letter-spacing:.18em;color:var(--dim);font-family:'Orbitron'}
.stat .v{font-family:'IBM Plex Mono';font-size:17px;font-weight:600;margin-top:4px}
.admin-grid{display:grid;gap:14px}
.admin-grid h3{font-size:12px;letter-spacing:.2em;color:var(--amber);margin-bottom:10px}
.inline{display:flex;gap:8px;flex-wrap:wrap}
.inline>*{flex:1;min-width:110px}
.feed-item{padding:12px 4px;border-bottom:1px solid var(--line)}
.feed-item .t{font-size:10px;color:var(--dim);font-family:'IBM Plex Mono'}
.lb-rank{font-family:'Orbitron';width:34px;color:var(--dim);flex:none}
@media(min-width:700px){.modal-bg{align-items:center}.modal{border-radius:18px}}
.iconfirm-bg{position:fixed;inset:0;background:rgba(3,5,10,.85);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.iconfirm{background:var(--panel);border:1px solid var(--line);border-radius:18px 18px 0 0;width:100%;max-width:920px;padding:22px 18px calc(20px + env(safe-area-inset-bottom));text-align:center}
.iconfirm p{margin-bottom:16px;font-size:15px;line-height:1.5}
.iconfirm .ic-btns{display:flex;gap:10px;justify-content:center}
/* casino animations */
@keyframes cardIn{from{transform:translateY(16px) rotate(5deg);opacity:0}to{transform:none;opacity:1}}
@keyframes flipIn{0%{transform:rotateY(90deg);opacity:.4}100%{transform:rotateY(0);opacity:1}}
.pcard{display:inline-block;background:#0E1730;border:1px solid var(--line);border-radius:7px;padding:7px 9px;margin:3px;font-family:'IBM Plex Mono','SF Mono',monospace;font-size:17px;font-weight:600}
.pcard.deal{animation:cardIn .35s ease both}
.pcard.flip{animation:flipIn .45s ease both}
.pcard.redsuit{color:var(--down)}
@keyframes winPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.win-flash{animation:winPulse .45s ease 2;color:var(--up)}
@keyframes loseShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.lose-shake{animation:loseShake .3s ease 2;color:var(--down)}
.rl-wrap{overflow:hidden;border:1px solid var(--line);border-radius:10px;position:relative;height:56px;margin:10px 0;background:#070C18}
.rl-strip{display:flex;will-change:transform}
.rl-cell{flex:none;width:56px;height:56px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono';font-weight:700;font-size:18px;border-right:1px solid #111A30}
.rl-marker{position:absolute;left:50%;top:0;bottom:0;width:2px;background:var(--amber);transform:translateX(-1px);z-index:2;box-shadow:0 0 10px var(--amber)}
.sreel-row{display:flex;gap:10px;justify-content:center;margin:12px 0}
.sreel{width:66px;height:66px;overflow:hidden;border:1px solid var(--line);border-radius:12px;background:#070C18}
.sreel-col{display:flex;flex-direction:column;will-change:transform}
.sreel-col span{height:66px;flex:none;display:flex;align-items:center;justify-content:center;font-size:38px}
.h-roll-big{font-family:'IBM Plex Mono';font-size:42px;font-weight:600;text-align:center;padding:10px 0;letter-spacing:.04em}
@media (prefers-reduced-motion:reduce){.rl-strip,.sreel-col{transition:none!important}.pcard.deal,.pcard.flip,.win-flash,.lose-shake{animation:none}}
</style>

// risk-free annual yields per bond (the "treasury curve")
const BOND_YIELD={TBIL:0.03,TNB2:0.038,TNB10:0.045,TIPS:0.035};
// the canonical risk-free rate used elsewhere (3-month bill)
function riskFreeRate(){return BOND_YIELD.TBIL;}

/* ---------- deterministic price engine ---------- */
function h32(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
function rnd(seed,i){const x=Math.sin(seed*374761.393+i*668265.263)*43758.5453;return (x-Math.floor(x))*2-1}
function noise(seed,t){const i=Math.floor(t),f=t-i,u=f*f*(3-2*f);return rnd(seed,i)*(1-u)+rnd(seed,i+1)*u}

const NEG_BETA={VOLX:-1.1,PHRX:-0.45,PLAT:-0.3,SALV:-0.55,SECC:-0.25,AEON:-0.35,ICE:-0.2};
function mkAsset(sym,name,type,sector,base,opt){
  opt=opt||{};const seed=h32(sym);
  const h1=(rnd(seed,1)+1)/2, h2=(rnd(seed,2)+1)/2, h3=(rnd(seed,3)+1)/2;
  let vol=opt.vol!==undefined?opt.vol:(type==="B"?.004+h1*.012:type==="E"?.05+h1*.05:type==="C"?.07+h1*.20:type==="X"?.22+h1*.28:.09+h1*.13);
  let beta=type==="B"?(sym==="TNB10"?-.15:-.05):type==="C"?.4+h3*.6:type==="X"?1.1+h3*.9:.6+h3*.9;
  if(NEG_BETA[sym]!==undefined)beta=NEG_BETA[sym];
  // market cap (float): bigger cap = more liquid = tighter spread.
  // log-normal-ish spread of caps from ~50M to ~900B
  const capTier= type==="E"?8e10 : type==="B"?5e11 : type==="X"?2e9+h2*4e10 :
                 (a=>a)(3e8+Math.pow(h1,2)*8e11);
  return {sym,name,name0:name,type,sector,sector0:sector,base,seed,vol,
    trend:type==="B"?0:(h2-.48)*.30,beta,
    cap:capTier, bm:opt.bm||false,listed:opt.listed||0};
}

/* game clock v2: anchored, supports pause + speed multiplier */
function migrateCfg(c){
  if(c&&!c.priceAnchor){c.priceAnchor=c.anchorG||Date.now();clearLpRef();}
  if(!c)return c;
  if(c.anchorR===undefined){
    c.anchorG=(c.pauseStart?c.pauseStart:Date.now())-(c.offset||0);
    c.anchorR=Date.now();c.speed=1;c.paused=!!c.pauseStart;
    delete c.pauseStart;delete c.offset;
  }
  if(c&&c.agentEnabled===undefined)c.agentEnabled=true;
  if(c&&!c.lastAgentGameTime)c.lastAgentGameTime=0;

  // gives most assets ±10-50%, breakouts up to ~+150%, crypto up to ~+300%
  let secular;

  if(a.type==="S")return h2<.3?0:a.base*h2*.05;
  if(a.type==="E")return a.base*h2*.035;return 0}
function shortLiab(u){let l=0;for(const s in u.sh||{})if(BYSYM[s])l+=u.sh[s].q*px(s);return l}
function marginRate(){return ((CFG&&CFG.marginRate!==undefined)?CFG.marginRate:12)/100}  // annual %
function maxLeverage(){return (CFG&&CFG.maxLev!==undefined)?CFG.maxLev:2}
function marginDebt(u){return u.margin||0}
function marginBuyingPower(u){
  // available margin = equity * maxLeverage - existing margin debt
  const eq=netWorth(u),extra=Math.max(0,eq*(maxLeverage()-1)-marginDebt(u));
  return u.cash+extra}
function netWorth(u){let v=u.cash+optsValue(u);
  for(const s in u.hold||{})if(BYSYM[s])v+=u.hold[s].q*px(s);
  return v-shortLiab(u)-marginDebt(u)}
function invested(u){return (u.sc!==undefined?u.sc:CFG.startCash)+(u.dep||0)}
function trueRet(u){const inv=invested(u);return inv>0?(netWorth(u)/inv-1)*100:NaN}

async function auth(isNew){
  const name=$("#a-user").value.trim(), pass=$("#a-pass").value;
  _lastUser=name;
  if(!/^[A-Za-z0-9_-]{2,20}$/.test(name))return renderAuth("Callsign: 2-20 letters, numbers, _ or - (no spaces).",true);
  if(pass.length<3)return renderAuth("Access code too short.",true);
  const key="u:"+name.toLowerCase().replace(/[^a-z0-9_-]/g,"_"), hp=await sha(pass), ex=await SG.get(key);
  if(isNew){
    if(ex)return renderAuth("That callsign is taken.",true);

    MYKEY=key;
    if(!await saveMe()){ME=null;MYKEY=null;return renderAuth("Write failed — close and reopen in Safari for best results.",true)}
  }else{

/* ---------- charts ---------- */
function drawChart(canvas,pts,color){
  const dpr=window.devicePixelRatio||1, w=canvas.clientWidth||320, h=canvas.clientHeight||180;
  canvas.width=w*dpr;canvas.height=h*dpr;
  const x=canvas.getContext("2d");x.scale(dpr,dpr);x.clearRect(0,0,w,h);
  if(!pts||pts.length<2)return;
  let mn=Math.min(...pts),mx=Math.max(...pts);if(mx-mn<1e-9){mx+=1;mn-=1}
  const pad=10,X=i=>pad+(w-2*pad)*i/(pts.length-1),Y=p=>h-pad-(h-2*pad)*(p-mn)/(mx-mn);
  const col=color||(pts[pts.length-1]>=pts[0]?"#42E596":"#FF5C7A");
  const g=x.createLinearGradient(0,0,0,h);g.addColorStop(0,col+"55");g.addColorStop(1,col+"00");
  x.beginPath();x.moveTo(X(0),Y(pts[0]));for(let i=1;i<pts.length;i++)x.lineTo(X(i),Y(pts[i]));
  x.strokeStyle=col;x.lineWidth=2;x.stroke();
  x.lineTo(X(pts.length-1),h);x.lineTo(X(0),h);x.closePath();x.fillStyle=g;x.fill();
  x.fillStyle="#8A97B8";x.font="10px IBM Plex Mono";
  x.fillText(fmt(mx),pad,12);x.fillText(fmt(mn),pad,h-3);
}

function attachHover(cv,pts,t0,t1,color){
  const redraw=()=>drawChart(cv,pts,color);
  cv.onpointermove=e=>{
    const r=cv.getBoundingClientRect(),fr=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));
    const i=Math.round(fr*(pts.length-1)),t=t0+(t1-t0)*i/(pts.length-1),p=pts[i];
    redraw();
    const ctx=cv.getContext("2d"),w=cv.clientWidth,h=cv.clientHeight,pad=10;
    let mn=Math.min(...pts),mx=Math.max(...pts);if(mx-mn<1e-9){mx+=1;mn-=1}
    const X=pad+(w-2*pad)*i/(pts.length-1),Y=h-pad-(h-2*pad)*(p-mn)/(mx-mn);
    ctx.strokeStyle="#8A97B8";ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(X,0);ctx.lineTo(X,h);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle="#E8EEFF";ctx.beginPath();ctx.arc(X,Y,3.5,0,7);ctx.fill();
    const lbl=fmt(p)+"  "+gdate(t,true);
    ctx.font="11px IBM Plex Mono";const tw=ctx.measureText(lbl).width;
    const tx=Math.min(Math.max(X-tw/2,4),w-tw-8);
    ctx.fillStyle="rgba(6,8,15,.88)";ctx.fillRect(tx-4,2,tw+8,16);
    ctx.fillStyle="#3FE0D0";ctx.fillText(lbl,tx,14);
  };
  cv.onpointerleave=redraw;
}

async function housekeeping(){
  if(!ME)return;let dirty=false;const now=gameNow(),f=feeFrac();
  /* --- dividend accrual (pays when >= 1 credit; shorts owe dividends) --- */
  const lastDiv=ME.lastDiv!==undefined?ME.lastDiv:(ME.g0!==undefined?ME.g0:now);
  if(now>lastDiv){
    const dtY=(now-lastDiv)/(365*864e5);let acc=0;
    for(const sm in ME.hold||{}){const a=BYSYM[sm];if(a)acc+=ME.hold[sm].q*divAnnual(a)*dtY}
    for(const sm in ME.sh||{}){const a=BYSYM[sm];if(a)acc-=ME.sh[sm].q*divAnnual(a)*dtY}
    if(Math.abs(acc)>=1){
      ME.cash+=acc;ME.lastDiv=now;
      ME.hist.push({at:Date.now(),g:now,side:"DIV",d:acc});
      toast("Dividends "+(acc>=0?"received: +":"owed on shorts: ")+fmt(acc));dirty=true;
    }
  }
  /* --- limit / stop order fills (samples the path since placement) --- */
  if((ME.orders||[]).length){
    for(let i=ME.orders.length-1;i>=0;i--){
      const o=ME.orders[i],a=BYSYM[o.sym];if(!a){ME.orders.splice(i,1);dirty=true;continue}
      const t0=o.pg,steps=40;let hit=false;
      if(now>t0)for(let k=0;k<=steps;k++){
        const pp=priceAt(a,t0+(now-t0)*k/steps);
        if(o.side==="B"&&o.kind==="L"&&pp<=o.trig){hit=true;break}
        if(o.side==="B"&&o.kind==="T"&&pp>=o.trig){hit=true;break}
        if(o.side==="S"&&o.kind==="L"&&pp>=o.trig){hit=true;break}
        if(o.side==="S"&&o.kind==="T"&&pp<=o.trig){hit=true;break}
      }
      if(!hit)continue;
      const lbl=(o.kind==="L"?"LIMIT":"STOP")+" FILL";
      if(o.side==="B"){
        const pEff=o.trig*(1+f);let q=o.q;
        if(q*pEff>ME.cash)q=Math.floor(ME.cash/pEff*1e6)/1e6;
        if(q>1e-9){
          ME.cash-=q*pEff;ME.hold=ME.hold||{};const pos=ME.hold[o.sym]||{q:0,c:0};
          pos.q+=q;pos.c+=q*pEff;ME.hold[o.sym]=pos;
          ME.hist.push({at:Date.now(),g:now,sym:o.sym,side:"BUY",q,p:pEff,o:lbl});
          toast(lbl+": bought "+(+q.toFixed(4))+" "+o.sym+" @ "+fmt(pEff));
        }else ME.hist.push({at:Date.now(),g:now,sym:o.sym,side:"OFAIL",q:o.q,p:o.trig,o:"NO CREDITS"});
      }else{
        const pEff=o.trig*(1-f),held=(ME.hold&&ME.hold[o.sym])?ME.hold[o.sym].q:0,q=Math.min(o.q,held);
        if(q>1e-9){
          const pos=ME.hold[o.sym];ME.cash+=q*pEff;pos.c-=pos.c*(q/pos.q);pos.q-=q;
          if(pos.q<=1e-9)delete ME.hold[o.sym];
          ME.hist.push({at:Date.now(),g:now,sym:o.sym,side:"SELL",q,p:pEff,o:lbl});
          toast(lbl+": sold "+(+q.toFixed(4))+" "+o.sym+" @ "+fmt(pEff));
        }else ME.hist.push({at:Date.now(),g:now,sym:o.sym,side:"OFAIL",q:o.q,p:o.trig,o:"NO SHARES"});
      }
      ME.orders.splice(i,1);dirty=true;
    }
  }
  /* --- margin interest accrual (game-time based, batched) --- */
  if((ME.margin||0)>0.01){
    const last=(ME.lastInt!==undefined)?ME.lastInt:now;
    const dtY=Math.max(0,(now-last)/(365*864e5));
    const interest=ME.margin*marginRate()*dtY;
    // only post an entry once accrued interest reaches >= 1 credit, to avoid
    // spamming the log at high time-compression. cash is charged at posting.
    if(interest>=1){
      ME.cash-=interest;ME.lastInt=now;
      ME.hist.push({at:Date.now(),g:now,side:"INT",d:-interest});
      if(interest>50)toast("Margin interest charged: "+fmt(interest),true);
      dirty=true;
    }
  }else if(ME.margin<=0.01&&ME.lastInt!==undefined){
    // no debt — reset the clock so interest doesn't accumulate while debt-free
    ME.lastInt=now;
  }
  /* --- margin call: net worth < 25% of total long exposure --- */
  const longExp=Object.keys(ME.hold||{}).reduce((v,sm)=>v+(BYSYM[sm]?ME.hold[sm].q*px(sm):0),0);
  if((ME.margin||0)>0&&netWorth(ME)<0.25*longExp){
    // force-sell all holdings to repay debt
    for(const sm in ME.hold){const a=BYSYM[sm];if(!a)continue;
      const pEff=px(sm)*(1-feeFrac()),proceeds=ME.hold[sm].q*pEff;
      ME.hist.push({at:Date.now(),g:now,sym:sm,side:"SELL",q:ME.hold[sm].q,p:pEff,o:"MARGIN CALL"});
      const repay=Math.min(ME.margin,proceeds);ME.margin-=repay;ME.cash+=proceeds-repay;
      delete ME.hold[sm];}
    ME.margin=0;dirty=true;
    toast("⚠ MARGIN CALL — all positions liquidated to repay loan.",true);
  }
  /* --- margin call: forced cover of all shorts --- */
  const liab=shortLiab(ME);
  if(liab>0&&netWorth(ME)<0.25*liab){
    for(const sm in ME.sh){
      const q=ME.sh[sm].q,pEff=px(sm)*(1+f);
      ME.cash-=q*pEff;
      ME.hist.push({at:Date.now(),g:now,sym:sm,side:"COVER",q,p:pEff,o:"MARGIN CALL"});
    }
    ME.sh={};dirty=true;
    toast("\u26A0 MARGIN CALL — all short positions force-covered at market.",true);
  }
  if(dirty)await saveMe();
}

async function trade(sym,dir){
  if(HALTED)return toast("Trading is halted.",true);
  let q=parseFloat($("#qty").value);
  if(!q||q<=0)return toast("Enter an amount.",true);
  await refreshMe();              // pull freshest balance (admin may have changed it)
  const f=feeFrac(),sideSign=dir>0?1:-1;
  if(BUYMODE==="cr"){
    // typed amount is total credits; estimate shares at top-of-book then
    // refine by walking the book so big orders get the right slippage.
    const topPx=tradePx(sym,sideSign)*(dir>0?(1+f):(1-f));
    let est=q/topPx;
    // refine twice using actual book avg price
    for(let it=0;it<2;it++){
      const ap=fillThroughBook(sym,sideSign,est).avgPx*(dir>0?(1+f):(1-f));
      est=q/ap;
    }
    q=Math.floor(est*1e6)/1e6;
    if(dir<0&&ME.hold&&ME.hold[sym])q=Math.min(q,ME.hold[sym].q);
    if(q<=0)return toast("Amount too small.",true);
  }
  // walk the order book for the actual average fill price (slippage)
  const fillRes=fillThroughBook(sym,sideSign,q);
  const pEff=dir>0?fillRes.avgPx*(1+f):fillRes.avgPx*(1-f);
  const cost=q*pEff;
  const useMargin=USEMARGIN&&dir>0;
  ME.hold=ME.hold||{};const pos=ME.hold[sym]||{q:0,c:0};
  if(dir>0){
    if(useMargin){
      const bp=marginBuyingPower(ME);
      if(cost>bp+1e-9)return toast("Exceeds margin buying power ("+fmt(bp)+").",true);
      if(maxLeverage()<=1)return toast("Margin trading is disabled by the GM.",true);
      // draw from cash first, borrow the rest
      const fromCash=Math.min(ME.cash,cost),borrowed=Math.max(0,cost-fromCash);
      if((ME.margin||0)<=0.01&&borrowed>0)ME.lastInt=gameNow(); // start interest clock
      ME.cash-=fromCash;ME.margin=(ME.margin||0)+borrowed;
      // check maintenance: equity must be >= 30% of total long exposure
      const longVal=Object.keys(ME.hold||{}).reduce((v,sm)=>v+(BYSYM[sm]?(ME.hold[sm].q+(sm===sym?q:0))*px(sm):0),0)+q*p;
      if(netWorth(ME)<0.3*longVal&&netWorth(ME)<0){ME.cash+=fromCash;ME.margin-=borrowed;
        return toast("Insufficient margin — net equity too low.",true)}
    }else{
      if(cost>ME.cash+0.005)return toast("Insufficient credits ("+fmt(cost)+" needed, "+fmt(ME.cash)+" available). Toggle MARGIN ON to borrow.",true);
      ME.cash-=cost;
    }
    pos.q+=q;pos.c+=cost;
  }else{
    if(q>pos.q+1e-9)return toast("You only hold "+pos.q+" shares.",true);
    // proceeds repay margin debt first, remainder goes to cash
    const repay=Math.min(ME.margin||0,cost);
    ME.margin=(ME.margin||0)-repay;ME.cash+=cost-repay;
    pos.c-=pos.c*(q/pos.q);pos.q-=q;
    if(pos.q<1e-9){delete ME.hold[sym]}
  }
  if(pos.q>0)ME.hold[sym]=pos;
  ME.hist=ME.hist||[];ME.hist.push({at:Date.now(),g:gameNow(),sym,side:dir>0?"BUY":"SELL",q,p:pEff});
  if(ME.hist.length>500)ME.hist=ME.hist.slice(-500);
  snapshotEq();
  if(!await saveMe())return toast("Order failed to sync — check connection and retry.",true);
  toast((dir>0?"Bought ":"Sold ")+(+q.toFixed(4))+" "+sym+" @ "+fmt(pEff)+" (incl. fee)");
  paintModal();
}

function portfolioSeries(ms,n=110){
  const now=gameNow(),g0=ME.g0!==undefined?ME.g0:(ME.created||now);
  const t0=Math.max(isFinite(ms)?now-ms:g0,g0);
  const evs=(ME.hist||[]).map(h=>({...h,gt:h.g!==undefined?h.g:h.at})).sort((a,b)=>a.gt-b.gt);
  let cash=ME.sc!==undefined?ME.sc:CFG.startCash,hold={},j=0;
  let shorts={};
  const apply=e=>{
    if(e.side==="BUY"){cash-=e.q*e.p;hold[e.sym]=(hold[e.sym]||0)+e.q}
    else if(e.side==="SELL"){cash+=e.q*e.p;hold[e.sym]=(hold[e.sym]||0)-e.q}
    else if(e.side==="GRANT"){hold[e.sym]=(hold[e.sym]||0)+e.q}
    else if(e.side==="ADJ"||e.side==="DIV"||e.side==="BET"){cash+=e.d}
    else if(e.side==="OBUY"){cash-=e.q*e.p}
    else if(e.side==="OSELL"||e.side==="OEXP"){cash+=e.q*e.p}
    else if(e.side==="SHORT"){cash+=e.q*e.p;shorts[e.sym]=(shorts[e.sym]||0)+e.q}
    else if(e.side==="COVER"){cash-=e.q*e.p;shorts[e.sym]=(shorts[e.sym]||0)-e.q}
    else if(e.side==="INT"){cash+=e.d}
  };
  const pts=[];
  for(let i=0;i<=n;i++){
    const t=t0+(now-t0)*i/n;
    while(j<evs.length&&evs[j].gt<=t){apply(evs[j]);j++}
    let val=cash;
    for(const sm in hold)if(BYSYM[sm]&&hold[sm]>1e-9)val+=hold[sm]*priceAt(BYSYM[sm],t);
    for(const sm in shorts)if(BYSYM[sm]&&shorts[sm]>1e-9)val-=shorts[sm]*priceAt(BYSYM[sm],t);
    pts.push(val);
  }
  pts[pts.length-1]=netWorth(ME); // anchor to live value (incl. options MTM)
  return pts;
}

const BOT_NAMES=["Zo_Prime","Ratrod","Cpt_Valeros","Unit-734","YsokiTrader","LadyNova","GrimVesk","DriftDiva","Skitter_S","Obozaya_Fan"];
function botEntries(){
  if(CFG.bots===false)return[];
  const t=gameNow(),ep=CFG.epoch;
  const years=(t-ep)/(365*864e5);
  return BOT_NAMES.map(n=>{
    const sd=h32("bot:"+n);
    const tr=rnd(sd,1)*0.18+0.03;   // -15% … +21% annual log-drift
    const nw=CFG.startCash*Math.exp(
      tr*years
      +0.09*noise(sd,t/1.3e8)
      +0.05*noise(sd^7,t/2.5e7)
    );
    return {n,nw,ret:(nw/CFG.startCash-1)*100,
      pos:2+(sd%7),joined:ep+(sd%24)*864e5};
  });
}

function recommendations(){
  // build data-driven picks with real reasoning from the engine state
  const recs=[];
  const tradeable=ASSETS.filter(a=>!a.bm||CFG.bmOpen);
  const reg=curRegime();
  // helper metrics
  const withMetrics=tradeable.map(a=>{
    const f=fundamentals(a);
    return {a,
      m1:chgMs(a.sym,2592e6),    // 1-month
      y1:chgMs(a.sym,31536e6),   // 1-year
      yld:(a.type==="B"?(BOND_YIELD[a.sym]||0)*100:(f&&f.yld)||0),
      beta:a.beta, vol:a.vol, pe:(f&&f.pe)||null};
  });
  // 1. Best value: a beaten-down NON-breakout-crashed name that's recovering
  const value=withMetrics.filter(x=>x.a.type==="S"&&x.y1<-15&&x.m1>x.y1/12)
    .sort((x,y)=>x.y1-y.y1)[0];
  if(value)recs.push({sym:value.a.sym,tag:"VALUE PLAY",col:"var(--up)",
    reason:`Down ${value.y1.toFixed(0)}% over the year but up ${value.m1.toFixed(1)}% this month — a possible bottom. Mean reversion favors a recovery from oversold levels.`});
  // 2. Momentum: a strong 1-month gainer with high beta
  const mom=withMetrics.filter(x=>(x.a.type==="S"||x.a.type==="X")&&x.m1>8)
    .sort((x,y)=>y.m1-x.m1)[0];
  if(mom)recs.push({sym:mom.a.sym,tag:"MOMENTUM",col:"var(--amber)",
    reason:`Up ${mom.m1.toFixed(1)}% in the last month with beta ${mom.beta.toFixed(2)}. Riding a strong trend — but watch for the cycle turning if it's run a while.`});
  // 3. Safe haven for current regime
  if(reg.k==="crash"||reg.k==="bear"||reg.k==="volatile"){
    const hedge=withMetrics.filter(x=>x.beta<0).sort((x,y)=>x.beta-y.beta)[0];
    if(hedge)recs.push({sym:hedge.a.sym,tag:"REGIME HEDGE",col:"var(--cyan)",
      reason:`Negative beta (${hedge.beta.toFixed(2)}) — tends to rise when the market falls. Current ${reg.label.toLowerCase()} makes this a defensive anchor.`});
  }else{
    const growth=withMetrics.filter(x=>x.a.type==="S"&&x.beta>1.2).sort((x,y)=>y.beta-x.beta)[0];
    if(growth)recs.push({sym:growth.a.sym,tag:"GROWTH",col:"var(--amber)",
      reason:`High beta (${growth.beta.toFixed(2)}) amplifies the current ${reg.label.toLowerCase()}. Aggressive upside if the trend holds.`});
  }
  // 4. Income: highest dividend yield
  const income=withMetrics.filter(x=>x.yld>2&&x.a.type!=="B").sort((x,y)=>y.yld-x.yld)[0];
  if(income)recs.push({sym:income.a.sym,tag:"INCOME",col:"var(--cyan)",
    reason:`Pays a ${income.yld.toFixed(1)}% dividend yield — steady cash flow that compounds at high time-compression. Good ballast for a portfolio.`});
  // 5. Risk-free: the bond bill
  recs.push({sym:"TBIL",tag:"RISK-FREE",col:"var(--dim)",
    reason:`Algalterian 90-day bill yields ${(riskFreeRate()*100).toFixed(1)}% with effectively zero risk. Park credits here between plays, or as a benchmark — any risky bet should beat this.`});
  // 6. Diversified core
  recs.push({sym:"AGXT",tag:"CORE HOLDING",col:"var(--vio)",
    reason:`The whole-market index returns ~7%/yr like a real broad-market fund. The boring, reliable backbone of any portfolio — buy and forget.`});
  return recs.filter((r,i,arr)=>arr.findIndex(x=>x.sym===r.sym)===i&&BYSYM[r.sym]);
}

/* ── roulette: decelerating strip ── */
async function spinRoulette(){
  if(SPINNING)return;
  const bet=betVal("#r-bet");if(!bet)return toast("Enter a bet.",true);
  await refreshMe();if(bet>ME.cash)return toast("Insufficient credits.",true);
  const pick=$("#r-pick").value,num=parseInt($("#r-num").value);
  if(pick==="NUM"&&(isNaN(num)||num<0||num>36))return toast("Pick a number 0-36.",true);
  const n=Math.floor(Math.random()*37);
  let win=false,mult=2;
  if(pick==="RED")win=REDS.has(n);
  else if(pick==="BLACK")win=n!==0&&!REDS.has(n);
  else if(pick==="EVEN")win=n!==0&&n%2===0;
  else if(pick==="ODD")win=n%2===1;
  else{win=n===num;mult=36}
  const delta=win?bet*(mult-1):-bet;
  SPINNING=true;$("#r-go").disabled=true;$("#r-res").textContent="";
  await wager(delta,"ROULETTE");
  RHIST.push(n);
  const wrap=$("#rl-wrap"),strip=$("#rl-strip");
  const finish=()=>{
    SPINNING=false;const go=$("#r-go");if(go)go.disabled=false;
    const res=$("#r-res");if(res){res.innerHTML=`Ball lands on <span style="color:${rlCol(n)}">${n}</span> — <span class="${win?"win-flash":"lose-shake"}" style="display:inline-block">${win?"WIN +"+fmt(bet*(mult-1)):"LOSE "+fmt(bet)}</span>`}
    const hh=$("#r-hist");if(hh)hh.innerHTML=rHistHTML();
  };
  if(!wrap||!strip||RM()){finish();return}
  const CELL=56,COUNT=44,LAND=COUNT-6;
  const cells=[];
  for(let i=0;i<COUNT;i++){const v=i===LAND?n:Math.floor(Math.random()*37);
    cells.push(`<div class="rl-cell" style="color:${rlCol(v)}">${v}</div>`)}
  strip.style.transition="none";strip.style.transform="translateX(0)";
  strip.innerHTML=cells.join("");
  const w=wrap.clientWidth,jit=(Math.random()*28-14);
  const off=LAND*CELL+CELL/2-w/2+jit;
  requestAnimationFrame(()=>{requestAnimationFrame(()=>{
    strip.style.transition="transform 3s cubic-bezier(.12,.65,.06,1)";
    strip.style.transform=`translateX(${-off}px)`;
  })});
  setTimeout(finish,3150);
}
/* ── blackjack: card objects with stable suits + deal/flip animations ── */
function bjDraw(){return {r:1+Math.floor(Math.random()*13),s:Math.floor(Math.random()*4)}}
function bjVal(h){let v=0,a=0;for(const c of h){if(c.r===1){a++;v+=11}else v+=Math.min(c.r,10)}
  while(v>21&&a>0){v-=10;a--}return v}
const SUITS=["\u2660","\u2665","\u2666","\u2663"];
function bjFace(c,opts){
  const r=c.r===1?"A":c.r===11?"J":c.r===12?"Q":c.r===13?"K":c.r;
  const red=c.s===1||c.s===2;
  const cl="pcard"+(red?" redsuit":"")+(opts&&opts.anim?" "+opts.anim:"");
  const dly=opts&&opts.delay?` style="animation-delay:${opts.delay}s"`:"";
  return `<span class="${cl}"${dly}>${r}${SUITS[c.s]}</span>`;
}
function bjBack(){return `<span class="pcard deal" style="color:var(--vio)">\uD83C\uDCA0</span>`}
function bjHTML(){
  const pv=bjVal(BJ.ph),done=BJ.done;
  const ph=BJ.ph.map((c,i)=>bjFace(c,{anim:i===BJ.ph.length-1&&BJ.justDrew?"deal":(BJ.fresh?"deal":""),delay:BJ.fresh?i*0.15:0})).join("");
  const dh=done
    ?BJ.dh.map((c,i)=>bjFace(c,{anim:"flip",delay:i*0.18})).join("")
    :bjFace(BJ.dh[0],{anim:BJ.fresh?"deal":""})+bjBack();
  BJ.fresh=false;BJ.justDrew=false;
  return `<div class="mono" style="font-size:14px;line-height:1.6">
    <div class="dim" style="font-size:11px;letter-spacing:.15em">DEALER${done?" ("+bjVal(BJ.dh)+")":""}</div>
    <div>${dh}</div>
    <div class="dim" style="font-size:11px;letter-spacing:.15em;margin-top:8px">YOU (${pv})</div>
    <div>${ph}</div></div>
   ${done?`<div class="disp" style="padding:12px 0;font-size:15px">
     <span class="${BJ.delta>0?"win-flash":BJ.delta<0?"lose-shake":"dim"}" style="display:inline-block">${BJ.msg}</span></div>
     <button class="btn vio" style="width:100%" onclick="BJ=null;renderTab()">NEW HAND</button>`
   :`<div class="inline" style="margin-top:10px">
     <button class="btn" onclick="bjHit()">HIT</button>
     <button class="btn amber" onclick="bjStand()">STAND</button></div>`}`;
}
async function bjDeal(){
  if(SPINNING)return;
  const bet=betVal("#bj-bet");if(!bet)return toast("Enter a bet.",true);
  await refreshMe();if(bet>ME.cash)return toast("Insufficient credits.",true);
  await wager(-bet,"BLACKJACK");
  BJ={bet,ph:[bjDraw(),bjDraw()],dh:[bjDraw(),bjDraw()],done:false,delta:-bet,msg:"",fresh:true,justDrew:false};
  if(bjVal(BJ.ph)===21)return bjSettle(true);
  $("#cas").innerHTML=bjHTML();
}
async function bjHit(){
  BJ.ph.push(bjDraw());BJ.justDrew=true;
  if(bjVal(BJ.ph)>21){BJ.done=true;BJ.msg="BUST — lose "+fmt(BJ.bet);$("#cas").innerHTML=bjHTML();return}
  $("#cas").innerHTML=bjHTML();
}
async function bjStand(){return bjSettle(false)}
async function bjSettle(natural){
  while(bjVal(BJ.dh)<17)BJ.dh.push(bjDraw());
  const pv=bjVal(BJ.ph),dv=bjVal(BJ.dh);let ret=0;
  if(natural&&dv!==21){ret=BJ.bet*2.5;BJ.msg="BLACKJACK! +"+fmt(BJ.bet*1.5)}
  else if(pv>21){ret=0;BJ.msg="BUST — lose "+fmt(BJ.bet)}
  else if(dv>21||pv>dv){ret=BJ.bet*2;BJ.msg="WIN +"+fmt(BJ.bet)}
  else if(pv===dv){ret=BJ.bet;BJ.msg="PUSH — bet returned"}
  else{ret=0;BJ.msg="Dealer wins — lose "+fmt(BJ.bet)}
  if(ret>0)await wager(ret,"BLACKJACK WIN");
  BJ.done=true;BJ.delta=ret-BJ.bet;
  $("#cas").innerHTML=bjHTML();
}
/* ── over/under: d100 tumbler ── */
function hlMults(){
  const L=Math.min(95,Math.max(5,parseInt($("#h-line").value)||50));
  const po=(100-L)/100,pu=(L-1)/100;
  $("#h-over").textContent="OVER "+L+" ("+(0.97/po).toFixed(2)+"\u00D7)";
  $("#h-under").textContent="UNDER "+L+" ("+(0.97/pu).toFixed(2)+"\u00D7)";
  $("#h-mult").textContent="d100 \u00B7 3% house edge";
}
async function hiloPlay(dir){
  if(SPINNING)return;
  const bet=betVal("#h-bet");if(!bet)return toast("Enter a bet.",true);
  const L=Math.min(95,Math.max(5,parseInt($("#h-line").value)||50));
  await refreshMe();if(bet>ME.cash)return toast("Insufficient credits.",true);
  const roll=1+Math.floor(Math.random()*100);
  const p=dir>0?(100-L)/100:(L-1)/100,mult=0.97/p;
  const win=dir>0?roll>L:roll<L;
  const delta=win?bet*(mult-1):-bet;
  SPINNING=true;$("#h-over").disabled=true;$("#h-under").disabled=true;$("#h-res").textContent="";
  await wager(delta,"OVER/UNDER");
  const rollEl=$("#h-roll");
  const finish=()=>{
    SPINNING=false;
    const o=$("#h-over"),u=$("#h-under");if(o)o.disabled=false;if(u)u.disabled=false;
    if(rollEl){rollEl.textContent=roll;rollEl.className="h-roll-big "+(win?"up":"down")}
    const res=$("#h-res");if(res)res.innerHTML=`<span class="${win?"win-flash":"lose-shake"}" style="display:inline-block">${win?"WIN +"+fmt(bet*(mult-1)):"LOSE "+fmt(bet)}</span>`;
  };
  if(!rollEl||RM()){finish();return}
  rollEl.className="h-roll-big";
  let t=0;const iv=setInterval(()=>{
    t+=60;rollEl.textContent=1+Math.floor(Math.random()*100);
    if(t>=1100){clearInterval(iv);finish()}
  },60);
}
/* ── slots: vertical spinning reels with staggered stops ── */
const SLOT_SYMS=["\uD83C\uDF0C","\uD83E\uDE90","\u2B50","\uD83D\uDE80","\uD83D\uDC7E","\uD83D\uDEF8","\uD83D\uDC8E"];
const SLOT_W=[30,25,20,12,8,4,1],SLOT_PAY=[3,5,8,12,20,40,100];
function slotPick(){let r=Math.random()*100,i=0;while(r>SLOT_W[i]){r-=SLOT_W[i];i++}return i}
async function spinSlots(){
  if(SPINNING)return;
  const bet=betVal("#s-bet");if(!bet)return toast("Enter a bet.",true);
  await refreshMe();if(bet>ME.cash)return toast("Insufficient credits.",true);
  const r=[slotPick(),slotPick(),slotPick()];
  let mult=0;
  if(r[0]===r[1]&&r[1]===r[2])mult=SLOT_PAY[r[0]];
  else if(r[0]===r[1]||r[1]===r[2]||r[0]===r[2])mult=1.35;
  const delta=mult>0?bet*(mult-1):-bet;
  SPINNING=true;$("#s-go").disabled=true;$("#s-res").textContent="";
  await wager(delta,"SLOTS");
  const finish=()=>{
    SPINNING=false;const go=$("#s-go");if(go)go.disabled=false;
    const res=$("#s-res");if(res)res.innerHTML=mult>0
      ?`<span class="win-flash" style="display:inline-block">${mult===1.35?"PAIR":"TRIPLE"}! +${fmt(bet*(mult-1))}</span>`
      :`<span class="lose-shake" style="display:inline-block">No match — lose ${fmt(bet)}</span>`;
  };
  if(RM()){
    [0,1,2].forEach(i=>{const col=$("#s-r"+i);if(col){col.style.transition="none";col.style.transform="none";col.innerHTML=`<span>${SLOT_SYMS[r[i]]}</span>`}});
    finish();return;
  }
  const H=66,LEN=16,DUR=[1.1,1.6,2.1];
  [0,1,2].forEach(i=>{
    const col=$("#s-r"+i);if(!col)return;
    let spans="";
    for(let k=0;k<LEN-1;k++)spans+=`<span>${SLOT_SYMS[slotPick()]}</span>`;
    spans+=`<span>${SLOT_SYMS[r[i]]}</span>`;
    col.style.transition="none";col.style.transform="translateY(0)";
    col.innerHTML=spans;
    requestAnimationFrame(()=>{requestAnimationFrame(()=>{
      col.style.transition=`transform ${DUR[i]}s cubic-bezier(.15,.6,.1,1)`;
      col.style.transform=`translateY(${-(LEN-1)*H}px)`;
    })});
  });
  setTimeout(finish,DUR[2]*1000+150);
}

      <button class="btn vio" onclick="adPause()">${isPaused()?"▶ RESUME MARKET CLOCK":"⏸ PAUSE MARKET CLOCK"}</button>
     </div>
     <div class="inline" style="margin-top:8px">
      <button class="btn ${CFG.agentEnabled!==false?"amber":"ghost"}" onclick="adToggleAgent()">${CFG.agentEnabled!==false?"🤖 AGENT ON":"🤖 AGENT OFF"}</button>
     </div>
     <div class="inline" style="margin-top:8px">
      ${CFG?[1,4,12,48].map(x=>`<button class="btn ghost ${speedNow()===x?"on":""}" style="${speedNow()===x?"border-color:var(--cyan);color:var(--cyan)":""}" onclick="adSpeed(${x})">${x}× SPEED</button>`).join(""):""} 
     </div>
     <div class="inline" style="margin-top:8px">
      <input id="ad-spd" type="number" min="0.1" step="any" inputmode="decimal" placeholder="Custom speed (now ${speedNow()}×)">
      <button class="btn ghost" onclick="adSpeed(parseFloat($('#ad-spd').value))">SET</button>
     </div>
     <div class="inline" style="margin-top:8px">
      <input id="ad-cash" type="number" inputmode="decimal" placeholder="New-account credits (${CFG.startCash})">
      <button class="btn ghost" onclick="adStartCash()">SET</button>
     </div>
     <div class="inline" style="margin-top:8px">
      <input id="ad-fee" type="number" step="any" min="0" max="10" inputmode="decimal" placeholder="Broker fee % (now ${(CFG.fee!==undefined?CFG.fee:0.25)}%)">
      <button class="btn ghost" onclick="adFee()">SET FEE</button>
     </div>
     <div class="inline" style="margin-top:8px">
      <button class="btn ${CFG.casino!==false?"red":"vio"}" onclick="adCasino()">${CFG.casino!==false?"CLOSE CASINO":"OPEN CASINO"}</button>
     </div>
     <div class="inline" style="margin-top:8px">
      <button class="btn ${CFG&&CFG.bots===false?"vio":"red"}" onclick="adBots()">${CFG&&CFG.bots===false?"SHOW SYNTHETIC TRADERS":"HIDE SYNTHETIC TRADERS"}</button>
     </div>
     <div class="inline" style="margin-top:8px">
      <input id="ad-mrate" type="number" step="any" min="0" max="200" inputmode="decimal" placeholder="Margin rate % p.a. (now ${(CFG.marginRate!==undefined?CFG.marginRate:12)}%)">
      <button class="btn ghost" onclick="adMarginRate()">SET RATE</button>
     </div>
     <div class="inline" style="margin-top:8px">
      <input id="ad-mlev" type="number" step="any" min="1" max="10" inputmode="decimal" placeholder="Max leverage (now ${(CFG.maxLev!==undefined?CFG.maxLev:2)}×)">
      <button class="btn ghost" onclick="adMarginLev()">SET LEVERAGE</button>
     </div>
     <div class="inline" style="margin-top:8px">
      <input id="ad-np" type="password" placeholder="New override code">
      <button class="btn ghost" onclick="adPass()">CHANGE CODE</button>
     </div>
   </div>
   <div class="card" style="border-color:var(--down)"><h3 style="color:var(--down)">DANGER ZONE</h3>
     <div class="inline">
      <button class="btn red" onclick="adResetMarket()">RESET MARKET PRICES</button>
      <button class="btn ghost" onclick="adRebasePrices()">RE-BASELINE TO NOW</button>
      <button class="btn red" onclick="adWipeUsers()">DELETE ALL ACCOUNTS</button>
     </div>
   </div>
  </div>`;
}
async function adRegime(k){await pushEv({t:"regime",k});toast("Regime set: "+REGIME_DEFS[k].label);renderApp();TAB="admin";go("admin")}
async function adPump(){
  const sym=$("#ad-sym").value,pc=parseFloat($("#ad-mag").value),min=parseFloat($("#ad-dur").value)||60;
  const silent=$("#ad-silent")&&$("#ad-silent").checked;
  if(!pc)return toast("Enter a % move.",true);
  await pushEv({t:"pump",sym,mag:Math.log(1+pc/100),dur:min*6e4,silent});
  toast(sym+" rigged: "+(pc>0?"+":"")+pc+"% over "+min+" min"+(silent?" (silent)":""));
}
function adRenameFill(){const a=BYSYM[$("#ad-rsym").value];if(!a)return;
  $("#ad-rname").value=a.name;$("#ad-rsec").value=a.sector}
async function adRename(){
  const sym=$("#ad-rsym").value,n=$("#ad-rname").value.trim(),sec=$("#ad-rsec").value.trim();
  if(!n)return toast("Enter a name.",true);
  CFG=(await SG.get("cfg"))||CFG;CFG.names=CFG.names||{};
  CFG.names[sym]={n,s:sec||undefined};
  if(!await SG.set("cfg",CFG))return toast("Save failed — try again.",true);
  applyNames();toast(sym+" is now \""+n+"\"");
}
async function adRenameReset(){
  const sym=$("#ad-rsym").value;
  CFG=(await SG.get("cfg"))||CFG;
  if(CFG.names)delete CFG.names[sym];
  if(!await SG.set("cfg",CFG))return toast("Save failed — try again.",true);
  applyNames();adRenameFill();toast(sym+" reset to "+BYSYM[sym].name0);
}
async function adIPO(){
  const sym=$("#ipo-sym").value.trim().toUpperCase(),name=$("#ipo-name").value.trim(),
    sec=$("#ipo-sec").value.trim()||"New Listing",base=parseFloat($("#ipo-px").value),
    vol=parseFloat($("#ipo-vol").value),bm=$("#ipo-bm").checked;
  if(!/^[A-Z0-9]{2,5}$/.test(sym))return toast("Symbol: 2-5 letters/numbers.",true);
  if(!name)return toast("Enter a company name.",true);
  if(!base||base<=0)return toast("Enter a start price.",true);
  CFG=migrateCfg(await SG.get("cfg"))||CFG;CFG.ipos=CFG.ipos||[];
  if(BYSYM[sym]||CFG.ipos.some(i=>i.sym===sym))return toast("Symbol already in use.",true);
  CFG.ipos.push({sym,name,sec,base,vol,bm,at:gameNow()});
  if(!await SG.set("cfg",CFG))return toast("Save failed.",true);
  rebuildAssets();
  if(!bm)await pushEv({t:"news",msg:"IPO: "+name+" ("+sym+") begins trading at "+fmt(base)});
  toast(sym+" is now listed"+(bm?" on the black market.":"."));renderApp();go("admin");
}
async function adDelist(sym){
  if(!await iconfirm("Delist "+sym+"? Player positions in it will stop being valued."))return;
  CFG=migrateCfg(await SG.get("cfg"))||CFG;
  CFG.ipos=(CFG.ipos||[]).filter(i=>i.sym!==sym);
  await SG.set("cfg",CFG);rebuildAssets();toast(sym+" delisted.");renderApp();go("admin");
}
async function adBM(){
  CFG=migrateCfg(await SG.get("cfg"))||CFG;CFG.bmOpen=!CFG.bmOpen;
  await SG.set("cfg",CFG);
  if(CFG.bmOpen)await pushEv({t:"news",msg:"Rumor: smuggler routes are open. Ask around for the black market."});
  toast(CFG.bmOpen?"Black market is open.":"Black market closed.");renderApp();go("admin");
}
async function adMarginRate(){
  const n=parseFloat($("#ad-mrate").value);
  if(isNaN(n)||n<0||n>200)return toast("Rate: 0–200% p.a.",true);
  CFG=migrateCfg(await SG.get("cfg"))||CFG;CFG.marginRate=n;
  await SG.set("cfg",CFG);toast("Margin rate set to "+n+"% per annum.");
}
async function adMarginLev(){
  const n=parseFloat($("#ad-mlev").value);
  if(isNaN(n)||n<1||n>10)return toast("Leverage: 1–10×.",true);
  CFG=migrateCfg(await SG.get("cfg"))||CFG;CFG.maxLev=n;
  await SG.set("cfg",CFG);toast("Max leverage set to "+n+"×. Set to 1× to disable margin.");
}
async function adFee(){
  const n=parseFloat($("#ad-fee").value);
  if(isNaN(n)||n<0||n>10)return toast("Fee: 0–10%.",true);
  CFG=migrateCfg(await SG.get("cfg"))||CFG;CFG.fee=n;
  await SG.set("cfg",CFG);toast("Broker fee set to "+n+"% per trade.");
}
async function adBots(){
  CFG=migrateCfg(await SG.get("cfg"))||CFG;CFG.bots=CFG.bots===false?true:false;
  await SG.set("cfg",CFG);toast(CFG.bots!==false?"Synthetic traders visible.":"Synthetic traders hidden.");
  renderApp();go("admin");
}
async function adCasino(){
  CFG=migrateCfg(await SG.get("cfg"))||CFG;CFG.casino=CFG.casino===false?true:false;
  await SG.set("cfg",CFG);toast(CFG.casino?"Casino open.":"Casino closed.");renderApp();go("admin");
}
async function adSPump(){
  const sec=$("#ad-ssec").value,pc=parseFloat($("#ad-smag").value),min=parseFloat($("#ad-sdur").value)||120;
  const silent=$("#ad-ssilent")&&$("#ad-ssilent").checked;
  if(!pc)return toast("Enter a % move.",true);
  await pushEv({t:"spump",sec,mag:Math.log(1+pc/100),dur:min*6e4,silent});
  toast(sec+" sector rigged: "+(pc>0?"+":"")+pc+"% over "+min+" min"+(silent?" (silent)":""));
}
async function adNews(){const m=$("#ad-news").value.trim();if(!m)return;
  await pushEv({t:"news",msg:m.slice(0,140)});$("#ad-news").value="";buildTicker();toast("Broadcast sent.")}
async function adPause(){
  CFG=migrateCfg(await SG.get("cfg"))||CFG;
  if(CFG.paused){CFG.anchorR=Date.now();CFG.paused=false;
    await SG.set("cfg",CFG);toast("Market clock resumed.")}
  else{CFG.anchorG=gameNow();CFG.anchorR=Date.now();CFG.paused=true;
    await SG.set("cfg",CFG);toast("Market clock paused — prices frozen.")}
  renderApp();go("admin");
}
async function adToggleAgent(){
  CFG=migrateCfg(await SG.get("cfg"))||CFG;
  CFG.agentEnabled=CFG.agentEnabled===false?true:false;
  await SG.set("cfg",CFG);
  toast(CFG.agentEnabled!==false?"Market agent enabled.":"Market agent paused.");
  renderApp();go("admin");
}
async function adSpeed(x){
  if(!x||x<=0||x>1000)return toast("Speed must be 0.1–1000.",true);
  CFG=migrateCfg(await SG.get("cfg"))||CFG;
  CFG.anchorG=gameNow();CFG.anchorR=Date.now();CFG.speed=x;
  await SG.set("cfg",CFG);toast("Market clock running at "+x+"× speed.");
  renderApp();go("admin");
}
async function adHalt(on){await pushEv({t:"halt",on});renderApp();go("admin");toast(on?"Trading halted.":"Trading resumed.")}
async function adStartCash(){const n=parseFloat($("#ad-cash").value);if(!n)return;
  CFG.startCash=n;await SG.set("cfg",CFG);toast("New accounts start with "+fmt(n))}
async function adPass(){const p=$("#ad-np").value;if(p.length<3)return toast("Too short.",true);
  CFG.adminHash=await sha(p);await SG.set("cfg",CFG);toast("Override code changed.")}
async function adRebasePrices(){
  if(!await iconfirm("Re-baseline all prices to current values?\nThe base prices shown will become today\'s prices. Historical charts will recalculate from this new anchor."))return;
  CFG=migrateCfg(await SG.get("cfg"))||CFG;
  CFG.priceAnchor=gameNow();
  clearLpRef();
  await SG.set("cfg",CFG);
  toast("Prices re-baselined to current values.");
  renderApp();go("admin");
}
async function adResetMarket(){if(!await iconfirm("Reset all prices to baseline and clear events? Player accounts are kept."))return;
  CFG.epoch=Date.now()-36e5;CFG.anchorG=Date.now();CFG.anchorR=Date.now();CFG.paused=false;await SG.set("cfg",CFG);EV=[];await SG.set("ev",EV);digestEvents();toast("Market reset.");renderApp();go("admin")}
async function adWipeUsers(){if(!await iconfirm("Delete EVERY player account? This cannot be undone."))return;
  const keys=await SG.list("u:");for(const k of keys)await SG.del(k);toast("All accounts deleted.");logout()}
async function adLoadUsers(){
  const keys=await SG.list("u:");const box=$("#ad-users");box.innerHTML="";
  for(const k of keys){
    const u=await SG.get(k);if(!u)continue;
    const d=document.createElement("div");d.style.cssText="border-bottom:1px solid var(--line);padding:10px 0";
    d.innerHTML=`<div style="display:flex;justify-content:space-between;color:var(--ink)"><b>${esc(u.n)}</b><span class="mono">${fmt(netWorth(u))}</span></div>
      <div class="inline" style="margin-top:6px">
        <input type="number" inputmode="decimal" placeholder="set credits" data-k="${k}" class="adcash">
        <button class="btn ghost adset" data-k="${k}">SET ₢</button>
        <button class="btn red addel" data-k="${k}">DELETE</button>
      </div>
      <div class="inline" style="margin-top:6px">
        <select class="adgsym" data-k="${k}">${ASSETS.map(a=>`<option>${a.sym}</option>`).join("")}</select>
        <input type="number" inputmode="decimal" placeholder="± shares" class="adgq" data-k="${k}">
        <button class="btn ghost adgrant" data-k="${k}">GRANT</button>
      </div>
      <div class="inline" style="margin-top:6px">
        <button class="btn ${u.l2?"amber":"ghost"} adspread" data-k="${k}">${u.l2?"L2 DATA: ON ✓":"GRANT LEVEL-2 DATA"}</button>
      </div>`;
    box.appendChild(d);
  }
  box.querySelectorAll(".adset").forEach(b=>b.onclick=async()=>{
    const k=b.dataset.k,n=parseFloat(box.querySelector(`.adcash[data-k="${k}"]`).value);
    if(isNaN(n))return toast("Enter an amount.",true);
    const u=await SG.get(k);if(!u)return;
    const delta=n-u.cash;u.cash=n;u.dep=(u.dep||0)+delta;
    u.hist=u.hist||[];u.hist.push({at:Date.now(),g:gameNow(),side:"ADJ",d:delta});
    await SG.set(k,u);
    if(k===MYKEY)await refreshMe();toast(u.n+" credits set to "+fmt(n));
  });
  box.querySelectorAll(".addel").forEach(b=>b.onclick=async()=>{
    const u=await SG.get(b.dataset.k);
    if(!await iconfirm("Delete account "+(u?u.n:"")+"?"))return;
    await SG.del(b.dataset.k);toast("Account deleted.");adLoadUsers();
  });
  box.querySelectorAll(".adspread").forEach(b=>b.onclick=async()=>{
    const k=b.dataset.k,u=await SG.get(k);if(!u)return;
    u.l2=!u.l2;await SG.set(k,u);
    if(k===MYKEY)await refreshMe();
    toast(u.n+(u.l2?" granted Level-2 market data access.":" Level-2 access revoked."));
    adLoadUsers();
  });
  box.querySelectorAll(".adgrant").forEach(b=>b.onclick=async()=>{
    const k=b.dataset.k,sym=box.querySelector(`.adgsym[data-k="${k}"]`).value,
      q=parseFloat(box.querySelector(`.adgq[data-k="${k}"]`).value);
    if(!q)return toast("Enter share count.",true);
    const u=await SG.get(k);if(!u)return;
    u.hold=u.hold||{};const pos=u.hold[sym]||{q:0,c:0},gp=px(sym);
    pos.q+=q;pos.c=Math.max(0,pos.c+q*gp);
    if(pos.q<=1e-9)delete u.hold[sym];else u.hold[sym]=pos;
    u.dep=(u.dep||0)+q*gp;
    u.hist=u.hist||[];u.hist.push({at:Date.now(),g:gameNow(),side:"GRANT",sym,q,p:gp});
    await SG.set(k,u);if(k===MYKEY)await refreshMe();
    toast((q>0?"Granted ":"Removed ")+Math.abs(q)+" "+sym+(q>0?" to ":" from ")+u.n);
  });
}

/* ---------- live updates ---------- */
const MONS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function gdate(t,short){const d=new Date(t);
  const dd=String(d.getDate()).padStart(2,"0"),hh=String(d.getHours()).padStart(2,"0"),mm=String(d.getMinutes()).padStart(2,"0");
  return short?dd+" "+MONS[d.getMonth()]+" "+hh+":"+mm
    :dd+" "+MONS[d.getMonth()]+" "+(d.getFullYear()-1709)+" AG \u00B7 "+hh+":"+mm+" GST"}
function tick(){
  if(!ME)return;
  const gc=$("#gclock");if(gc)gc.textContent=gdate(gameNow())+(speedNow()!==1&&!isPaused()?" \u00B7 "+speedNow()+"\u00D7":"")+(isPaused()?" \u00B7 PAUSED":"");
  document.querySelectorAll("[data-px]").forEach(el=>el.textContent=fmt(px(el.dataset.px)));
  document.querySelectorAll("[data-chg]").forEach(el=>{const c=chg24(el.dataset.chg);
    el.textContent=pct(c)+(el.classList.contains("mono")?" · 24H":"");el.classList.remove("up","down");el.classList.add(cls(c))});
  document.querySelectorAll("[data-chgm]").forEach(el=>{const c=chgMs(el.dataset.chgm,MRANGE_MS[MRANGE]||864e5);
    el.textContent=pct(c);el.classList.remove("up","down");el.classList.add(cls(c))});
  const nw=$("#h-nw");if(nw)nw.textContent=fmt(netWorth(ME));
}
async function poll(){
  if(!ME)return;
  const oldHalt=HALTED, oldReg=curRegime().k, oldEvLen=EV.length, oldPause=isPaused(), oldSpd=speedNow();
  const oldBM=!!(CFG&&CFG.bmOpen),oldCas=!(CFG&&CFG.casino===false);
  CFG=migrateCfg(await SG.get("cfg"))||CFG;rebuildAssets();
  if(TAB==="market"&&$("#mlist"))paintList();
  await loadEvents();await refreshMe();
  await settleOptions();await housekeeping();
  if(HALTED!==oldHalt||curRegime().k!==oldReg||isPaused()!==oldPause||speedNow()!==oldSpd||oldBM!==!!CFG.bmOpen||oldCas!==!(CFG.casino===false)){renderApp();go(TAB)}
  else if(EV.length!==oldEvLen){buildTicker();if(TAB==="feed")renderTab()}
  const rb=$("#regime-b");if(rb){const r=curRegime();rb.style.color=r.col;rb.textContent="◈ "+r.label+" ◈"}
  snapshotEq();
}

/* ---------- boot ---------- */
(async function(){
  try{
    await SG.probe();STORAGE_OK=SG_MODE!=="memory";await ensureCfg();rebuildAssets();await loadEvents();
    renderAuth();
    setInterval(tick,2000);
    setInterval(poll,12000);
    setInterval(()=>{if(OPEN&&$("#achart")){const a=BYSYM[OPEN];if(!a)return;
      const pts=series(OPEN,RANGES[RANGE]),now=gameNow(),t0=Math.max(now-RANGES[RANGE],CFG.epoch,a.listed||0);
      drawChart($("#achart"),pts);attachHover($("#achart"),pts,t0,now)}},10000);
  }catch(e){
    document.body.innerHTML='<div style="padding:40px;text-align:center;color:#FF5C7A;font-family:monospace">Exchange uplink failed: '+e.message+'</div>';
  }
})();
</script>
