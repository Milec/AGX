name: Release Foundry module

# Packages the AGX Foundry module into agx-link.zip and attaches it to the
# GitHub release. Triggers on v* tags or manually via workflow_dispatch.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build agx-link.zip
        run: |
          cd foundry-module
          zip -r ../agx-link.zip . -x '*.DS_Store'

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: |
            agx-link.zip
            foundry-module/module.json
